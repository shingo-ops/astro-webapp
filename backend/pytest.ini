[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
markers =
    bench: AC3.5 解析速度ベンチ（環境変数 SKIP_BENCH=1 で skip 可）
# CI coverage gate: 80% は将来目標。未テストルーター（invoices/quotes/roles/products 等）
# のカバレッジ追加で段階的に引き上げる。現状の 70% をリグレッション防止の基準とする。
addopts = --cov=app --cov-report=term-missing --cov-fail-under=70
