version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v3.11.3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--log.level=warn"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - ./monitoring/prometheus/secrets:/etc/prometheus/secrets:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host-gateway:host-gateway"
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-https://app.salesanchor.jp/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - GF_DATE_FORMATS_USE_BROWSER_LOCALE=true
      - GF_DATE_FORMATS_FULL_DATE=YYYY/MM/DD HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_DAY=MM/DD
      - GF_DATE_FORMATS_INTERVAL_MONTH=YYYY/MM
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
      - GF_USERS_DEFAULT_LANGUAGE=ja-JP
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  node-exporter:
    image: prom/node-exporter:v1.11.1
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  gha-exporter:
    build:
      context: ./monitoring/gha-exporter
      args:
        GHA_EXPORTER_VERSION: "v0.0.15"
    environment:
      - GHA_APP_ID=${GHA_APP_ID}
      - GHA_APP_KEY_FILE=/run/secrets/gha-key
      - GHA_OWNER=shingo-ops
    command:
      - "--repos=salesanchor"
      - "--sleep=60s"
      - "--backfill"
    volumes:
      - ${GHA_APP_KEY_PATH}:/run/secrets/gha-key:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8080/metrics >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  github-collector:
    build:
      context: ./monitoring/github-collector
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=shingo-ops/salesanchor
      - PR_LOOKBACK=30
      - PORT=8000
      - COLLECT_INTERVAL=300
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8000/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  loki:
    # ログ集約: アプリ VPS の Promtail (docker-compose.exporters.yml) が
    # discord-gateway コンテナのログを収集し、SSH 逆トンネル経由で push。
    # discord-gateway ログクエリ: {job="containerlogs", container_name=~".*discord.*"}
    # DM 受信エラー確認:         {job="containerlogs"} |= "[dm_writer]" |= "失敗"
    # Loki アラートルール:        monitoring/loki/rules/jarvis/alerts.yml::discord_gateway
    image: grafana/loki:3.7.2
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - loki_data:/loki
      - ./monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ./monitoring/loki/rules:/loki/rules:ro
    ports:
      - "3100:3100"
    restart: unless-stopped
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true

  uptime-kuma:
    image: louislam/uptime-kuma:2.3.0
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  uptime_kuma_data:
