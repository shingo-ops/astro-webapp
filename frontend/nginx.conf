server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # index.html: 毎回サーバーに確認させる（キャッシュ無効）
    # → デプロイ後にブラウザが必ず新しいアセットURLを参照できる
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # JS/CSS/画像 等のハッシュ付きアセット: 1年間キャッシュ
    # → Vite がビルドごとにファイル名を変えるため、古いファイルが返ることはない
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA ルーティング（全パスを index.html にフォールバック）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
