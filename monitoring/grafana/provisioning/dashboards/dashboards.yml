# Grafana ダッシュボード自動プロビジョニング
# UX 階層:
#   大カテゴリ: 監視メイン（全体の入口）
#   中カテゴリ: 各タブのダッシュボード（テーマ別）
#   小カテゴリ: コンテナ詳細・DB詳細（ドリルダウン先）
# フォルダはAdmin管理用。UX階層はパネルのドリルダウンリンクで定義。

apiVersion: 1

providers:
  - name: 'Sales Anchor'
    orgId: 1
    folder: 'Sales Anchor'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
