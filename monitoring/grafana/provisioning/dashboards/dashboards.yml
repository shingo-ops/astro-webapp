# Grafana ダッシュボード自動プロビジョニング
# 起動時にJSONファイルからダッシュボードを自動登録

apiVersion: 1

providers:
  - name: 'Sales Anchor'
    orgId: 1
    folder: 'Sales Anchor'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
