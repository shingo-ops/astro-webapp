# Grafana ダッシュボード自動プロビジョニング
# 大カテゴリ = フォルダ（3分類）
# 中カテゴリ = ダッシュボード内の Row パネル
# 小カテゴリ = ドリルダウンリンク（nav-config.json で管理）

apiVersion: 1

providers:
  - name: '概要'
    orgId: 1
    folder: '概要'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json/overview
      foldersFromFilesStructure: false

  - name: 'アプリケーション'
    orgId: 1
    folder: 'アプリケーション'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json/application
      foldersFromFilesStructure: false

  - name: 'インフラ'
    orgId: 1
    folder: 'インフラ'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json/infrastructure
      foldersFromFilesStructure: false
