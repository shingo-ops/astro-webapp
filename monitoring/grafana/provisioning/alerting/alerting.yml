# monitoring/grafana/provisioning/alerting/alerting.yml
# ============================================================
# Grafana アラート通知設定（プロビジョニング）
#
# 【設定内容】
#   - contactPoints: Discord 通知先（discord-ops）
#   - policies: 全アラートを discord-ops へルーティング
#
# 【前提条件】
#   docker-compose.yml の grafana サービスに以下の環境変数が必要:
#     GF_DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
#   .env に DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/XXXXX/YYYYY を設定すること
#
# 【DISCORD_WEBHOOK_URL が空の場合】
#   contact point は登録されるが通知は送信されない（サイレント失敗）
#   設定後は grafana コンテナを再起動すること: docker compose restart grafana
# ============================================================

apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord-ops
    receivers:
      - uid: discord-ops-discord
        type: discord
        settings:
          url: ${GF_DISCORD_WEBHOOK_URL}
          message: |-
            {{ range .Alerts }}**{{ .Annotations.summary }}**
            {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
            重要度: {{ .Labels.severity | default "unknown" }}
            {{ end }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: discord-ops
    group_by:
      - alertname
      - job
      - instance
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
