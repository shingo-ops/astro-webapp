# Loki 異常検知アラートルール
# 認証失敗の連続検知、エラーログ急増検知

groups:
  - name: auth_anomaly
    rules:
      # 認証失敗が5分間に20回以上（ブルートフォース攻撃の可能性）
      - alert: BruteForceAttempt
        expr: |
          sum(count_over_time({job="containerlogs"} |~ "401|403|auth.*fail|login.*fail|Unauthorized" [5m])) > 20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ブルートフォース攻撃の可能性を検知"
          description: "直近5分間に認証失敗が20回以上発生しています。即時確認してください。"

      # 認証失敗が1時間に50回以上（低頻度の攻撃）
      - alert: SustainedAuthFailure
        expr: |
          sum(count_over_time({job="containerlogs"} |~ "401|403|auth.*fail|Unauthorized" [1h])) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "認証失敗が継続的に発生しています"
          description: "直近1時間に認証失敗が50回以上です。"

  - name: error_anomaly
    rules:
      # バックエンドのエラーログ急増（5分間に30件以上）
      - alert: BackendErrorSpike
        expr: |
          sum(count_over_time({job="containerlogs", container_name=~".*backend.*"} |~ "ERROR|Exception|Traceback" [5m])) > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "バックエンドのエラーログが急増しています"
          description: "直近5分間にERROR/Exceptionが30件以上検出されました。"

  - name: discord_gateway
    rules:
      # Discord Gateway 切断 / 再接続失敗（DM 受信箱に影響）
      - alert: DiscordGatewayReconnectFailure
        expr: |
          sum(count_over_time({job="containerlogs", container_name=~".*discord.*"} |~ "reconnect|LoginFailure|RuntimeError|接続失敗" [10m])) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Discord Gateway が再接続に繰り返し失敗しています"
          description: "直近10分間に reconnect/LoginFailure ログが3件以上。DM 受信が停止している可能性があります。"

      # dm_writer DB 書き込みエラー（lead 取得失敗）
      - alert: DiscordDmWriterError
        expr: |
          sum(count_over_time({job="containerlogs", container_name=~".*discord.*"} |= "[dm_writer]" |~ "失敗|ERROR|error" [5m])) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Discord DM 受信箱への書き込みエラーが発生しています"
          description: "dm_writer が5分間に5件以上のエラーを出力しました。DB 接続またはスキーマを確認してください。"

  - name: error_anomaly
    rules:
      # バックエンドのエラーログ急増（5分間に30件以上）
      - alert: BackendErrorSpike
        expr: |
          sum(count_over_time({job="containerlogs", container_name=~".*postgres.*"} |~ "ERROR|FATAL|PANIC" [5m])) > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQLでエラーが発生しています"
          description: "直近5分間にDB ERROR/FATAL/PANICログを検出しました。"
