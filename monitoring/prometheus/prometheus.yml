# Prometheus 設定ファイル
# CPU・メモリ・DB接続数・HTTPエラーレートを収集

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# アラートルール
rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus 自身のメトリクス
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter（ホストOS: CPU/メモリ/ディスク）
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # PostgreSQL Exporter（DB接続数・クエリ統計）
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Nginx Exporter（リクエスト数・ステータスコード）
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]

  # FastAPI バックエンド（HTTPリクエスト数・レスポンスタイム・エラーレート）
  - job_name: "backend"
    static_configs:
      - targets: ["backend:8000"]

  # GitHub Actions Exporter（CI実行メトリクス: ワークフロー/ジョブ/ステップ実行時間・成否）
  # rate limit 考慮: gha-exporter 側がデフォルト1分間隔でポーリング。Prometheus は 60s で収集。
  - job_name: "gha-exporter"
    static_configs:
      - targets: ["gha-exporter:8080"]
    scrape_interval: 60s

  # cAdvisor（コンテナ別 CPU・メモリ・ネットワーク使用量）ADR-079
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Redis Exporter（Redisキャッシュメトリクス）ADR-079
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Uptime Kuma（死活監視メトリクス）
  # v2.x は Basic 認証が必要。パスワードはコンテナ内シークレットファイルで管理
  - job_name: "uptime-kuma"
    static_configs:
      - targets: ["uptime-kuma:3001"]
    metrics_path: /metrics
    basic_auth:
      username: "shingo@treasureislandjp.com"
      password_file: /etc/prometheus/secrets/uptime-kuma.passwd
