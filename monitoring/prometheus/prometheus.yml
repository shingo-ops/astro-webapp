# Prometheus 設定ファイル
# CPU・メモリ・DB接続数・HTTPエラーレートを収集

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# アラートルール
rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus 自身のメトリクス
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter（ホストOS: CPU/メモリ/ディスク）
  # 管理室VPS 自身とアプリVPS を同じ job にまとめ、instance ラベルで区別する。
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "mgmt-vps"
      - targets: ["host-gateway:19100"]
        labels:
          instance: "app-vps"

  # PostgreSQL Exporter（DB接続数・クエリ統計）
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["host-gateway:19187"]
        labels:
          instance: "app-vps"

  # Nginx Exporter（リクエスト数・ステータスコード）
  - job_name: "nginx-exporter"
    static_configs:
      - targets: ["host-gateway:19113"]
        labels:
          instance: "app-vps"

  # Backend（FastAPI /metrics）
  # nginx 経由で app.salesanchor.jp の /metrics を mgmt VPS からスクレイプする。
  - job_name: "backend"
    scheme: https
    metrics_path: /metrics
    tls_config:
      server_name: app.salesanchor.jp
    static_configs:
      - targets: ["49.212.137.46:443"]
        labels:
          instance: "app-vps"

  # GitHub Actions Exporter（CI実行メトリクス: ワークフロー/ジョブ/ステップ実行時間・成否）
  # rate limit 考慮: gha-exporter 側がデフォルト1分間隔でポーリング。Prometheus は 60s で収集。
  - job_name: "gha-exporter"
    static_configs:
      - targets: ["gha-exporter:8080"]
    scrape_interval: 60s

  # cAdvisor: 無効化済み（VPS cgroup 名前空間制限により取得不可 ADR-079）
  # - job_name: "cadvisor"
  #   static_configs:
  #     - targets: ["cadvisor:8080"]

  # Redis Exporter（Redisキャッシュメトリクス）ADR-079
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["host-gateway:19121"]
        labels:
          instance: "app-vps"

  # Uptime Kuma（死活監視メトリクス）
  # v2.x は Basic 認証が必要。パスワードはコンテナ内シークレットファイルで管理
  - job_name: "uptime-kuma"
    static_configs:
      - targets: ["uptime-kuma:3001"]
    metrics_path: /metrics
    basic_auth:
      username: "shingo@treasureislandjp.com"
      password_file: /etc/prometheus/secrets/uptime-kuma.passwd
