# Prometheus アラートルール
# Grafana経由でSlack通知を設定する

groups:
  - name: system_alerts
    rules:
      # CPU使用率が80%を超えた場合（5分間平均）
      - alert: HighCpuUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU使用率が80%を超えています"
          description: "CPU使用率: {{ $value | printf \"%.1f\" }}%（5分間平均）"

      # メモリ使用率が85%を超えた場合
      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "メモリ使用率が85%を超えています"
          description: "メモリ使用率: {{ $value | printf \"%.1f\" }}%"

      # ディスク使用率が80%を超えた場合
      - alert: HighDiskUsage
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ディスク使用率が80%を超えています"
          description: "ディスク使用率: {{ $value | printf \"%.1f\" }}%"

  - name: application_alerts
    rules:
      # PostgreSQL接続数が上限の80%を超えた場合
      - alert: HighDbConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB接続数が80を超えています"
          description: "現在の接続数: {{ $value }}"

      # PostgreSQLがダウンした場合
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQLがダウンしています"
          description: "即時対応が必要です"

      # Nginx 5xxエラーが5分間に10件以上
      - alert: HighErrorRate
        expr: increase(nginx_http_requests_total{status=~"5.."}[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "5xxエラーが急増しています"
          description: "直近5分間の5xxエラー: {{ $value | printf \"%.0f\" }}件"

      # 502 Bad Gateway（上流サービス障害）が2分間に5件以上
      - alert: High502Rate
        expr: increase(nginx_http_requests_total{status="502"}[2m]) > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "502 Bad Gatewayが急増しています"
          description: "直近2分間の502エラー: {{ $value | printf \"%.0f\" }}件。バックエンドまたはMeta API接続を確認してください。"

      # サービスダウン検知（Exporter応答なし）
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }}がダウンしています"
          description: "Exporterからの応答がありません。即時確認してください。"

      # FastAPI バックエンド 5xxエラーレート（tokens.yml: backend_5xx_per_1m=5）
      # backend/app/metrics.py が出力する http_requests_total を使用
      - alert: BackendHighErrorRate
        expr: sum(rate(http_requests_total{job="backend", status=~"5.."}[1m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "バックエンド 5xxエラーが急増しています"
          description: "5xxエラーが 1分間で {{ $value | printf \"%.1f\" }} req/s を超えています（閾値: 5 req/s）"

      # FastAPI バックエンド P99 レイテンシ（tokens.yml: backend_p99_latency_sec=2.0）
      - alert: BackendHighLatency
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le)) > 2.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "バックエンド P99 レイテンシが高い"
          description: "P99 レスポンスタイムが {{ $value | printf \"%.2f\" }}s を超えています（閾値: 2.0s）"

      # FastAPI バックエンドの同時処理中リクエスト数（workers=1 前提）
      - alert: BackendWorkerSaturated
        expr: http_requests_in_flight{job="backend"} > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "バックエンド worker が飽和し始めています"
          description: "同時処理中リクエスト数が 1 を超えています。workers=1 運用では待ち行列が発生している可能性があります。"

      # SSE 接続数が多いと worker 余力の確認が必要になる
      - alert: BackendSseConnectionsHigh
        expr: sum(sse_connections_active{job="backend"}) > 8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "バックエンド SSE 接続数が多い"
          description: "SSE 接続数が 8 を超えています。SSE は worker を占有しない一方で、接続とメモリを消費します。"
