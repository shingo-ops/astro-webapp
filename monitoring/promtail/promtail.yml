# Promtail 設定ファイル
# Dockerコンテナのログを収集してLokiに送信

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${PROMTAIL_LOKI_URL}

scrape_configs:
  # Dockerコンテナのログを自動収集
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/log/docker/*log

  # Nginxエラーログ収集（502/504等の上流エラーを Loki で検索可能にする）
  - job_name: nginx_error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          log_type: error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - regex:
          expression: '(?P<level>emerg|alert|crit|error|warn|notice|info|debug)'
      - labels:
          level:

  # SSH 接続ログ（ADR-079: Claude Code 監視アクセスの監査ログ）
  # /var/log はdocker-compose.yml で :ro マウント済み
  - job_name: ssh_auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: sshd
          log_type: auth
          __path__: /var/log/auth.log
    pipeline_stages:
      - regex:
          expression: '(?P<level>error|warning|info|Failed|Accepted|Invalid)'
      - labels:
          level:

  # docker compose のコンテナラベルからログを取得
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
      - json:
          expressions:
            tag: tag
          source: attrs
      - regex:
          expression: (?P<container_name>[a-zA-Z0-9_-]+)
          source: tag
      - labels:
          stream:
          container_name:
      # discord-gateway コンテナに service=discord-gateway ラベルを付与
      # Loki クエリ: {job="containerlogs", service="discord-gateway"} |= "[dm_writer]"
      - match:
          selector: '{container_name=~".*discord.*gateway.*"}'
          stages:
            - static_labels:
                service: discord-gateway
      - output:
          source: output
