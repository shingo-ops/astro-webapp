# Promtail 設定ファイル
# Dockerコンテナのログを収集してLokiに送信

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Dockerコンテナのログを自動収集
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/log/docker/*log

  # Nginxエラーログ収集（502/504等の上流エラーを Loki で検索可能にする）
  - job_name: nginx_error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          log_type: error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - regex:
          expression: '(?P<level>emerg|alert|crit|error|warn|notice|info|debug)'
      - labels:
          level:

  # docker compose のコンテナラベルからログを取得
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
      - json:
          expressions:
            tag: tag
          source: attrs
      - regex:
          expression: (?P<container_name>[a-zA-Z0-9_-]+)
          source: tag
      - labels:
          stream:
          container_name:
      - output:
          source: output
