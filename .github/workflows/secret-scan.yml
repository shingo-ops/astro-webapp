name: Secret Scan

# PR・develop/main へのプッシュでシークレット漏洩を自動検知
# 設定: .gitleaks.toml（プロジェクトルート）
# ドキュメント: docs/B-11_credential_management_policy.md

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  gitleaks:
    name: gitleaks（シークレット漏洩検出）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全コミット履歴を取得（差分スキャンのため）

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: PR へのインラインコメント機能（有料機能）が必要な場合のみ設定
          # 未設定でもスキャン・CI FAIL は動作する（OSS / プライベートリポジトリ共通）
