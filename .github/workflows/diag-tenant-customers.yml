name: Diag - Tenant customers inventory

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Query all tenants for customer counts
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            docker exec astro-webapp-postgres-1 psql -U jarvis -d jarvis_db -c "
              SELECT id, tenant_code, is_active FROM public.tenants ORDER BY id;
            "
            echo "--- customers per tenant ---"
            for schema in tenant_001 tenant_003 tenant_004 tenant_005; do
              count=$(docker exec astro-webapp-postgres-1 psql -U jarvis -d jarvis_db -tAc "SELECT count(*) FROM $schema.customers;" 2>/dev/null || echo "SCHEMA_MISSING")
              echo "$schema: $count customers"
            done
