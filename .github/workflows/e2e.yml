name: Frontend E2E (Playwright)

# Phase 1-E F2-S3: 撮影台本 docs/META_APP_REVIEW_SCREENCAST_SCRIPT.md の 7 シーン +
# Data Deletion Status Page を Playwright で自動化する。CI 時間を抑えるため
# chromium のみで実行し、artifact として playwright-report と失敗時の
# trace / screenshot / video を upload する。
#
# 実機 Meta OAuth は通さず、frontend が叩く /api/v1/* を Playwright route で
# mock する設計（tests-e2e/utils/api-mock.ts）。Firebase Auth は
# tests-e2e/utils/auth.ts で IndexedDB persistence + identitytoolkit endpoint
# 経由で bypass する。

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop
      - main
# NOTE (2026-05-22): paths フィルタ削除。Required check 設定 (Lint & Dark Mode
# Check ADR-067) が paths にマッチしない PR で "Expected — Waiting for status
# to be reported" のまま pending → merge blocked デッドロックが PR #534 で発生。
# Issue #523 ② で migration-guard と同じく「paths 条件なし常時実行 + 不要時即
# pass」パターンに統一。frontend 未変更時は各 step 内で対象ファイル 0 件 → 即 pass。

jobs:
  # ─── ADR-067: ダークモード色規約チェック ───────────────────────────────────
  lint:
    name: Lint & Dark Mode Check (ADR-067)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint — TSXインラインスタイルへのhex色禁止 / lucide-react直接import禁止
        run: npm run lint

      - name: CSS hex色チェック — App.css等への直書き禁止
        run: npm run check:css-colors

      - name: ダークモード変数パリティチェック — :root と :root.force-dark の一致確認
        run: npm run check:dark-parity

      - name: JSX絵文字チェック — 絵文字・記号文字の直書き禁止
        run: npm run check:jsx-emoji

      - name: CSS var フォールバックチェック — var(--x, #hex) 禁止
        run: npm run check:css-var-fallbacks

  # ─── E2E テスト ────────────────────────────────────────────────────────────
  playwright:
    name: Playwright E2E (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint  # lint が通らないと E2E も動かない

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Playwright のブラウザは別キャッシュ。OS 依存の system deps は --with-deps で入る。
      # actions/cache で node_modules ごと cache すると Playwright バイナリも入るが、
      # 公式推奨は browsers を別 cache key にする（version 固定で hit 率高い）。
      - name: Get Playwright version
        id: pw
        run: |
          PW_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps (chromium)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        # cache hit でも system deps は image によって不足するため最小限を入れる
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E
        env:
          # CI 上で webServer の reuseExistingServer=false が走る
          CI: 'true'
          # Vite dev server に渡す Firebase 用ダミー値（mock 経由で bypass）
          VITE_FIREBASE_API_KEY: AIzaSyE2E-dummy-api-key
          VITE_FIREBASE_AUTH_DOMAIN: e2e-fixture.firebaseapp.com
          VITE_GCP_PROJECT_ID: e2e-fixture
        run: npm run test:e2e

      # 失敗時 / 常時 artifact upload
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test results (trace / video / screenshot)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 14
          if-no-files-found: ignore
