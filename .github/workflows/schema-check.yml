name: Tenant Schema Integrity Check

# ADR-036 Level 3: テナントスキーマ整合性チェック
#
# トリガー:
#   - PR / push で backend / migrations / scripts 配下が変更された場合
#
# 検証内容:
#   1. PostgreSQL を起動し、最小限の公開スキーマを作成
#   2. setup_tenant.py で 4 つのテストテナントを作成（tenant_004 が基準スキーマになる）
#   3. sync_tenant_schema.py --dry-run を実行
#   4. 差分があれば PR をブロック（終了コード 1）

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  # schedule 削除（2026-05-28）: PR + push トリガーで十分にカバーされるため冗長。
# NOTE: paths フィルタ削除（e2e.yml #534 と同じデッドロック回避）。
# Required check (テナントスキーマ整合性チェック) として Ruleset 登録済みのため、
# paths フィルタがあると非 backend PR で pending のまま merge 不可になる。
# detect-changes job で変更ファイルを判定し、不要時は schema-check をスキップ(neutral=pass)。

jobs:
  detect-changes:
    name: スキーマ関連ファイル変更検出
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.check.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check relevant file changes
        id: check
        run: |
          BASE="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -qE "^(backend/app/models\.py|migrations/|scripts/migrate_|scripts/db/|scripts/setup_tenant\.py|\.github/workflows/schema-check\.yml)"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "対象ファイルの変更なし — テナントスキーマチェックをスキップして即 pass"
          fi

  schema-check-run:
    name: テナントスキーマ整合性チェック（実行）
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: jarvis_schema_check_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jarvis -d jarvis_schema_check_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jarvis:testpass@localhost:5432/jarvis_schema_check_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Fernet key
        id: fernet
        run: |
          KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      # NOTE: "Wait for PostgreSQL" 手動ループ削除（2026-05-28）。
      # services の health-check が通過した時点で PostgreSQL は確実に起動済み。

      # setup_tenant.py が必要とする最小限の公開スキーマを作成する。
      # public.tenants, public.users, public.permissions の 3 テーブルがあれば
      # setup_tenant.py が完走できる。
      - name: Create minimal public schema
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U jarvis -d jarvis_schema_check_db -v ON_ERROR_STOP=1 <<'SQL'
          -- public.tenants（setup_tenant.py が INSERT / SELECT に使用）
          CREATE TABLE IF NOT EXISTS public.tenants (
              id          SERIAL PRIMARY KEY,
              tenant_name VARCHAR(255) NOT NULL UNIQUE,
              tenant_code VARCHAR(50)  NOT NULL UNIQUE,
              is_active   BOOLEAN      NOT NULL DEFAULT TRUE,
              settings    JSONB                 DEFAULT '{}',
              created_at  TIMESTAMPTZ           DEFAULT NOW(),
              updated_at  TIMESTAMPTZ           DEFAULT NOW()
          );

          -- public.users（RLS ポリシーが参照）
          CREATE TABLE IF NOT EXISTS public.users (
              id            SERIAL PRIMARY KEY,
              tenant_id     INTEGER      NOT NULL REFERENCES public.tenants(id) ON DELETE CASCADE,
              username      VARCHAR(255) NOT NULL,
              email         VARCHAR(255) NOT NULL UNIQUE,
              password_hash VARCHAR(255) NOT NULL DEFAULT '',
              full_name     VARCHAR(255),
              role          VARCHAR(50)           DEFAULT 'user',
              is_active     BOOLEAN               DEFAULT TRUE,
              locale        VARCHAR(10)  NOT NULL DEFAULT 'ja',
              theme         VARCHAR(10)  NOT NULL DEFAULT 'light',
              created_at    TIMESTAMPTZ           DEFAULT NOW(),
              updated_at    TIMESTAMPTZ           DEFAULT NOW(),
              last_login    TIMESTAMPTZ
          );

          -- public.permissions（seed_system_roles が参照）
          CREATE TABLE IF NOT EXISTS public.permissions (
              id          SERIAL PRIMARY KEY,
              key         VARCHAR(100) NOT NULL UNIQUE,
              resource    VARCHAR(50)  NOT NULL,
              action      VARCHAR(50)  NOT NULL,
              description VARCHAR(255) NOT NULL,
              category    VARCHAR(50)  NOT NULL
          );
          SQL

      # public.permissions に最低限のデータを seed する（migration 042 の依存）
      - name: Seed permissions master
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U jarvis -d jarvis_schema_check_db -v ON_ERROR_STOP=1 \
            < migrations/002_add_permissions_master.sql || true
          psql -h localhost -U jarvis -d jarvis_schema_check_db -v ON_ERROR_STOP=1 \
            < migrations/004_add_phase2_permissions.sql || true
          psql -h localhost -U jarvis -d jarvis_schema_check_db -v ON_ERROR_STOP=1 \
            < migrations/006_add_phase3_permissions.sql || true
          psql -h localhost -U jarvis -d jarvis_schema_check_db -v ON_ERROR_STOP=1 \
            < migrations/008_add_phase4_permissions.sql || true
          psql -h localhost -U jarvis -d jarvis_schema_check_db -v ON_ERROR_STOP=1 \
            < migrations/018_extend_permissions_with_menu_grain.sql || true
          psql -h localhost -U jarvis -d jarvis_schema_check_db -v ON_ERROR_STOP=1 \
            < migrations/024_add_staff_bots_permissions.sql || true

      # 4 つのテストテナントを作成する。
      # ID 4 が tenant_004 = sync_tenant_schema.py の基準スキーマになる。
      - name: Create test tenants (1-4)
        env:
          # ADR-044: setup_tenant.py が `from app.xxx import ...` を解決できるよう
          # PYTHONPATH に backend/ を追加する（schema-check ジョブは backend/ を
          # working-directory にしているが、subprocess は親 dir を継承しないため明示）。
          PYTHONPATH: ${{ github.workspace }}/backend
          METADATA_FERNET_KEY: ${{ steps.fernet.outputs.key }}
          META_VERIFY_TOKEN: ci-verify-token
          META_APP_SECRET: ci-app-secret
          META_APP_ID: ci-app-id
          META_OAUTH_REDIRECT_URI: https://test.example.com/callback
          REDIS_URL: ""
          ENVIRONMENT: test
        run: |
          cd backend
          for i in 1 2 3 4; do
            echo "=== Creating test-tenant-$i ==="
            DATABASE_URL="${{ env.DATABASE_URL }}" \
            TENANT_CODE="test-tenant-$i" \
            TENANT_NAME="Test Tenant $i" \
            python ../scripts/setup_tenant.py
          done

      # 基準スキーマ（tenant_004）と他テナントを比較する。
      # 差分がなければ終了コード 0、あれば 1 でジョブが失敗する。
      - name: Run schema diff check (dry-run)
        env:
          # ADR-044/045: sync_tenant_schema.py が `from app.xxx import ...` を解決できるよう
          # PYTHONPATH に backend/ を追加する（setup_tenant.py と同じ理由）。
          PYTHONPATH: ${{ github.workspace }}/backend
          METADATA_FERNET_KEY: ${{ steps.fernet.outputs.key }}
          META_VERIFY_TOKEN: ci-verify-token
          META_APP_SECRET: ci-app-secret
          META_APP_ID: ci-app-id
          META_OAUTH_REDIRECT_URI: https://test.example.com/callback
          REDIS_URL: ""
          ENVIRONMENT: test
        run: |
          cd backend
          DATABASE_URL="${{ env.DATABASE_URL }}" \
          python ../scripts/db/sync_tenant_schema.py --dry-run

  # test.yml の pytest アグリゲータと同パターン。
  # schema-check-run が skipped（スキーマ変更なし）でも success でも通過とみなし、
  # Required Status Check「テナントスキーマ整合性チェック」を常に報告する。
  schema-check:
    name: テナントスキーマ整合性チェック
    needs: [detect-changes, schema-check-run]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report results
        run: |
          result="${{ needs.schema-check-run.result }}"
          echo "schema-check-run: $result"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "✅ テナントスキーマチェック通過（skipped = スキーマ変更なし）"
            exit 0
          else
            echo "❌ テナントスキーマチェック失敗"
            exit 1
          fi
