name: Migration SQL Test

# 目的: マイグレーションSQL を本番適用前に実際の PostgreSQL で検証する
#
# 検証内容:
#   1. 既存データが入った状態でマイグレーションを実行（本番を模擬）
#   2. 同じマイグレーションをもう一度実行（冪等性チェック）
#   3. 追加されたカラムに既存行の値が正しく入っているか確認
#
# これにより防げること:
#   - SQL 構文エラー（デプロイ前に発覚）
#   - DEFAULT 指定漏れ（既存行が NULL になるバグ）
#   - ADD COLUMN IF NOT EXISTS 書き忘れ（再実行でエラーになるバグ）

on:
  pull_request:
    branches: [main, develop]

jobs:
  test-migrations:
    name: マイグレーションSQL 実行テスト（実DB）
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: jarvis_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jarvis -d jarvis_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jarvis:testpass@localhost:5432/jarvis_db
      PGPASSWORD: testpass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: PostgreSQL 待機
        run: |
          for i in $(seq 1 10); do
            pg_isready -h localhost -U jarvis -d jarvis_db && exit 0
            sleep 2
          done
          echo "PostgreSQL が起動しませんでした" && exit 1

      # ── Step 1: 本番を模擬した初期スキーマ（既存データあり）を作る ──────────────
      - name: 既存データ付きの公開スキーマを作成
        run: |
          psql -h localhost -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 <<'SQL'
          -- public.tenants
          CREATE TABLE IF NOT EXISTS public.tenants (
              id          SERIAL PRIMARY KEY,
              tenant_name VARCHAR(255) NOT NULL UNIQUE,
              tenant_code VARCHAR(50)  NOT NULL UNIQUE,
              is_active   BOOLEAN      NOT NULL DEFAULT TRUE,
              settings    JSONB                 DEFAULT '{}',
              created_at  TIMESTAMPTZ           DEFAULT NOW(),
              updated_at  TIMESTAMPTZ           DEFAULT NOW()
          );

          -- public.users（is_super_admin は意図的に含めない = migration 前の状態）
          CREATE TABLE IF NOT EXISTS public.users (
              id            SERIAL PRIMARY KEY,
              tenant_id     INTEGER      NOT NULL REFERENCES public.tenants(id) ON DELETE CASCADE,
              email         VARCHAR(255) NOT NULL UNIQUE,
              password_hash VARCHAR(255) NOT NULL DEFAULT '',
              full_name     VARCHAR(255),
              role          VARCHAR(50)           DEFAULT 'user',
              is_active     BOOLEAN               DEFAULT TRUE,
              locale        VARCHAR(10)  NOT NULL DEFAULT 'ja',
              theme         VARCHAR(10)  NOT NULL DEFAULT 'light',
              created_at    TIMESTAMPTZ           DEFAULT NOW(),
              updated_at    TIMESTAMPTZ           DEFAULT NOW(),
              last_login    TIMESTAMPTZ
          );

          -- public.permissions
          CREATE TABLE IF NOT EXISTS public.permissions (
              id          SERIAL PRIMARY KEY,
              key         VARCHAR(100) NOT NULL UNIQUE,
              resource    VARCHAR(50)  NOT NULL,
              action      VARCHAR(50)  NOT NULL,
              description VARCHAR(255) NOT NULL DEFAULT '',
              category    VARCHAR(50)  NOT NULL DEFAULT ''
          );

          -- 既存データを挿入（本番の既存ユーザーを模擬）
          INSERT INTO public.tenants (tenant_name, tenant_code)
          VALUES ('テストテナント', 'test-tenant') ON CONFLICT DO NOTHING;

          INSERT INTO public.users (tenant_id, email, full_name)
          VALUES (1, 'existing@example.com', '既存ユーザー') ON CONFLICT DO NOTHING;
          SQL

      # ── Step 2: Sprint 1 を適用（Sprint 2 の前提条件）──────────────────────────
      - name: Sprint 1 マイグレーションを適用
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          if [ -f scripts/migrate_inventory_sprint1.py ]; then
            python scripts/migrate_inventory_sprint1.py
            echo "✅ Sprint 1 完了"
          else
            echo "ℹ️  Sprint 1 スクリプトなし — スキップ"
          fi

      # ── Step 3: PR で変更されたマイグレーションスクリプトを実行 ──────────────────
      - name: 変更されたマイグレーションを検出
        id: detect
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" \
            | grep '^scripts/migrate_' | sort || true)

          echo "changed_scripts<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  マイグレーションスクリプトの変更なし"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "🔍 対象スクリプト:"
            echo "$CHANGED"
          fi

      - name: 変更スクリプトを 1回目実行（既存データへの適用テスト）
        if: steps.detect.outputs.has_changes == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          echo "${{ steps.detect.outputs.changed_scripts }}" | while read script; do
            [ -z "$script" ] && continue
            echo "▶ $script を実行中..."
            python "$script"
            echo "✅ $script 成功"
          done

      - name: 変更スクリプトを 2回目実行（冪等性テスト）
        if: steps.detect.outputs.has_changes == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          echo "🔄 冪等性チェック（同じスクリプトを再実行）"
          echo "${{ steps.detect.outputs.changed_scripts }}" | while read script; do
            [ -z "$script" ] && continue
            echo "▶ $script を再実行中..."
            python "$script"
            echo "✅ $script 再実行も成功（冪等性 OK）"
          done

      # ── Step 4: 既存データに DEFAULT 値が正しく入っているか確認 ─────────────────
      - name: 既存行に DEFAULT 値が正しく適用されているか検証
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          echo "🔍 既存ユーザー行の状態を確認:"
          psql -h localhost -U jarvis -d jarvis_db -c \
            "SELECT id, email, full_name FROM public.users;" \
            -v ON_ERROR_STOP=1

          # is_super_admin が追加された場合、既存行が NULL でないことを確認
          HAS_COL=$(psql -h localhost -U jarvis -d jarvis_db -tAc \
            "SELECT COUNT(*) FROM information_schema.columns
             WHERE table_schema='public' AND table_name='users'
             AND column_name='is_super_admin';" 2>/dev/null || echo "0")

          if [ "$HAS_COL" = "1" ]; then
            NULL_COUNT=$(psql -h localhost -U jarvis -d jarvis_db -tAc \
              "SELECT COUNT(*) FROM public.users WHERE is_super_admin IS NULL;")
            if [ "$NULL_COUNT" != "0" ]; then
              echo ""
              echo "❌ 既存ユーザー ${NULL_COUNT}件 の is_super_admin が NULL です"
              echo "   migration SQL に DEFAULT 値が指定されているか確認してください"
              exit 1
            fi
            echo "✅ 既存ユーザーの is_super_admin: NULL なし（DEFAULT が正しく適用された）"
          fi

          echo "✅ 全検証パス"
