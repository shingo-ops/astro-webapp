name: Security Vulnerability Scan (Weekly)

# 依存パッケージの CVE（既知脆弱性）を週次でスキャンする。
# bandit はコードの書き方を検査するが、ライブラリ自体の CVE は見ない。
# 新しい CVE は毎日発見されるため、コードを変更しなくても脆弱性が混入し続ける。
#
# - npm-audit : フロントエンド依存 HIGH/CRITICAL のみ検知
# - pip-audit : バックエンド依存 全脆弱性を検知
#
# 脆弱性検出時: GitHub Issue を自動起票（重複起票しない）
# 脆弱性なし  : ワークフローが緑で通過（通知なし）
#
# スケジュール: 毎週水曜 04:00 JST (19:00 UTC Tuesday)
#   火曜の既存週次スキャン（frontend-check / test.yml）と重複しない曜日を選択。

on:
  schedule:
    - cron: '0 19 * * 2'  # 毎週水曜 04:00 JST
  workflow_dispatch:        # 緊急チェック・初回動作確認用の手動実行

jobs:
  npm-audit:
    name: npm dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run npm audit（HIGH / CRITICAL のみ・本番依存のみ）
        id: npm_audit
        run: npm audit --audit-level=high --production
        working-directory: frontend
        continue-on-error: true  # Issue 起票ステップに進むため非ブロック

      - name: Create GitHub Issue on vulnerability found
        if: steps.npm_audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[security] npm 依存パッケージに HIGH+ 脆弱性が検出されました';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,npm-audit',
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  '週次 npm audit で HIGH 以上の脆弱性が検出されました。',
                  '',
                  `**Actions ログ（詳細）**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  '### 対応手順',
                  '1. `cd frontend && npm audit` でローカル確認',
                  '2. `npm audit fix` または手動でパッケージバージョンを更新',
                  '3. 修正 PR を develop にマージ後、このイシューをクローズ',
                ].join('\n'),
                labels: ['security', 'npm-audit']
              });
            }

      - name: Fail job if vulnerabilities found
        if: steps.npm_audit.outcome == 'failure'
        run: exit 1

  pip-audit:
    name: pip dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit==2.10.0

      - name: Run pip-audit（本番依存のみ）
        id: pip_audit
        run: pip-audit -r backend/requirements.txt
        continue-on-error: true  # Issue 起票ステップに進むため非ブロック

      - name: Create GitHub Issue on vulnerability found
        if: steps.pip_audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[security] pip 依存パッケージに脆弱性が検出されました';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,pip-audit',
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  '週次 pip-audit で脆弱性が検出されました。',
                  '',
                  `**Actions ログ（詳細）**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  '### 対応手順',
                  '1. `pip-audit -r backend/requirements.txt` でローカル確認',
                  '2. 該当パッケージを最新版にバージョンアップして `requirements.txt` を更新',
                  '3. 修正 PR を develop にマージ後、このイシューをクローズ',
                ].join('\n'),
                labels: ['security', 'pip-audit']
              });
            }

      - name: Fail job if vulnerabilities found
        if: steps.pip_audit.outcome == 'failure'
        run: exit 1
