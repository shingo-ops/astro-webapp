name: active-work integrity

on:
  push:
    branches: [develop]
    paths: ['.claude-pipeline/active-work.md']
  pull_request:
    branches: [develop]
    paths: ['.claude-pipeline/active-work.md']

jobs:
  branch-existence-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches
        run: git fetch origin --prune 2>/dev/null || true

      - name: Check IN_PROGRESS branches exist on remote
        run: |
          # active-work.md の IN_PROGRESS 行に記載されたブランチが
          # リモートに実際に存在するか確認する。
          # 存在しないブランチ = マージ後に cleanup されなかったゾンビ行の可能性。
          # ※ fail ではなく warning — ブランチ削除済みのケースを考慮

          MISSING_COUNT=0
          CHECKED_COUNT=0

          while IFS= read -r BRANCH; do
            [ -z "$BRANCH" ] && continue
            CHECKED_COUNT=$((CHECKED_COUNT + 1))

            if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
              echo "OK  $BRANCH — リモートブランチ確認済み"
            else
              echo "::warning file=.claude-pipeline/active-work.md::IN_PROGRESS のブランチ '$BRANCH' がリモートに存在しません（マージ済みか削除済みの可能性）"
              MISSING_COUNT=$((MISSING_COUNT + 1))
            fi
          done < <(python3 -c "
          import re, sys
          try:
              content = open('.claude-pipeline/active-work.md', encoding='utf-8').read()
              for line in content.splitlines():
                  m = re.match(r'\|\s*(\S+)\s*\|.*\|\s*IN_PROGRESS\s*\|', line)
                  if m:
                      print(m.group(1))
          except Exception as e:
              print(f'PARSE_ERROR: {e}', file=sys.stderr)
          " 2>/dev/null)

          echo ""
          echo "チェック完了: ${CHECKED_COUNT} 件の IN_PROGRESS ブランチを確認"

          if [ "$MISSING_COUNT" -gt 0 ]; then
            echo "警告: ${MISSING_COUNT} 件のブランチがリモートに存在しません。"
            echo "  active-work.md の対象行を DONE/REVIEW に更新するか、"
            echo "  cleanup-worktree.sh を実行してください。"
            # exit 0 — 警告のみ。fail させない（ブランチ削除済みの正常ケースを考慮）
            exit 0
          else
            echo "全 IN_PROGRESS ブランチのリモート存在確認 OK"
          fi
