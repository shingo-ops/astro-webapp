name: Frontend Check

on:
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  check:
    name: Frontend lint & custom checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run check:all (lint + custom scripts including check-page-layout)
        run: npm run check:all
        working-directory: frontend

      - name: TypeScript type check (navKey template literal enforcement)
        run: npx tsc --noEmit
        working-directory: frontend
