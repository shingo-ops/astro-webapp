name: CLAUDE.md Size Guard

on:
  pull_request:
    branches: [main, develop]

jobs:
  check:
    name: CLAUDE.md line count check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: CLAUDE.md 変更チェック
        id: changed
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q 'CLAUDE\.md'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v4
        if: steps.changed.outputs.changed == 'true'
        with:
          node-version: '20'
      - name: Check CLAUDE.md sizes
        if: steps.changed.outputs.changed == 'true'
        working-directory: frontend
        run: node scripts/check-claude-size.js
      - name: CLAUDE.md 未変更のためスキップ
        if: steps.changed.outputs.changed == 'false'
        run: echo "CLAUDE.md に変更なし — スキップ"
