name: monthly secret expiry check

on:
  schedule:
    - cron: '0 9 1 * *'  # 毎月1日 18:00 JST
  workflow_dispatch:

jobs:
  secret-expiry-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check GitHub Secrets last updated date (180-day rotation)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_OWNER_PING: ${{ secrets.DISCORD_WEBHOOK_SCHEDULED_REPORT }}
        run: |
          # 180日以上更新されていない重要 Secret を検出
          WATCH_LIST="PIPELINE_PAT SSH_PRIVATE_KEY META_APP_SECRET DISCORD_WEBHOOK_OWNER_PING DISCORD_WEBHOOK_SCHEDULED_REPORT DISCORD_WEBHOOK_PR METADATA_FERNET_KEY"

          TODAY_S=$(date -u +%s)
          STALE_LIST=""
          STALE_COUNT=0

          while IFS= read -r SECRET; do
            NAME=$(echo "$SECRET" | jq -r '.name')
            UPDATED=$(echo "$SECRET" | jq -r '.updated_at')

            # 監視対象リストに含まれるものだけチェック
            echo "$WATCH_LIST" | grep -qw "$NAME" || continue

            UPDATED_S=$(date -d "$UPDATED" +%s 2>/dev/null) || continue
            DIFF_DAYS=$(( (TODAY_S - UPDATED_S) / 86400 ))

            if [ "$DIFF_DAYS" -ge 180 ]; then
              STALE_LIST="${STALE_LIST}"$'\n'"- \`${NAME}\` (最終更新: ${UPDATED:0:10}、${DIFF_DAYS}日経過)"
              STALE_COUNT=$((STALE_COUNT + 1))
            fi
          done < <(gh api --paginate repos/shingo-ops/salesanchor/actions/secrets | jq -c '.secrets[]')

          if [ "$STALE_COUNT" -eq 0 ]; then
            echo "✅ 全 Secret が 180 日以内に更新済み"
            exit 0
          fi

          echo "🔑 期限超過 Secret ${STALE_COUNT} 件検出"

          MSG="🔑 **GitHub Secrets のローテーションが必要です（180日超過: ${STALE_COUNT} 件）**
          ${STALE_LIST}

          GitHub Settings → Secrets で値を更新してください。
          手順: docs/runbooks/secret-rotation.md"

          bash scripts/notify/discord-owner-ping.sh "$MSG"
