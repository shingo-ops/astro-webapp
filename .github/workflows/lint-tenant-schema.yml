name: ADR-072 Lint (Tenant Schema)

# ADR-072 Phase 4: tenant schema 修飾の lint job (**strict mode**)。
#
# 検出ルール:
#   Rule A — tenant スキーマ内テーブル名が `text("... FROM <bare-table> ...")`
#            形式で出現し、かつ同 endpoint が tenant_table_ref / reset_tenant_context
#            のどちらも呼ばない。
#   Rule B — write 系 endpoint で `await db.commit()` を呼ぶが、後続に
#            `reset_tenant_context()` の呼び出しが対称的に来ない。
#
# Phase 3 (warning mode) で 75 violations を検出 → Phase 2.5 (PR #800) で 73 件、
# Phase 3.5 (PR #818) で残 2 件 (false positive) を解消し、0 violations 達成。
# 本 Phase 4 で **mode=strict** に切り替えて CI fail 可能化、新規違反の混入を物理 block する。
#
# 別途 GitHub Branch Protection Rules で本 job を required check に追加すること
# (Phase 4 完了 = workflow strict 化 + required check 設定)。
#
# 参照: docs/adr/ADR-072-tenant-schema-prefix-enforcement.md §4 / §5

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "backend/app/routers/**"
      - "scripts/lint_tenant_schema.py"
      - ".github/workflows/lint-tenant-schema.yml"
  push:
    branches:
      - develop
      - main
    paths:
      - "backend/app/routers/**"
      - "scripts/lint_tenant_schema.py"
      - ".github/workflows/lint-tenant-schema.yml"

jobs:
  lint:
    name: ADR-072 tenant schema lint (strict mode)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run ADR-072 linter (strict)
        run: |
          python3 scripts/lint_tenant_schema.py --mode strict backend/app/routers/
        # mode=strict: 違反があれば exit 1 で CI fail。
        # 違反が新規 PR で発生したら本 step で stop → 修正必須。
