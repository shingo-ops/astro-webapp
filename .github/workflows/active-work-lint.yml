name: active-work lint

on:
  push:
    branches-ignore:
      - 'main'
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check active-work.md column format
        run: |
          # active-work.md が変更されていない場合はスキップ（必須ステータスチェック対応）
          if git diff --name-only "origin/${{ github.base_ref || 'develop' }}...HEAD" 2>/dev/null \
              | grep -q '\.claude-pipeline/active-work\.md'; then
            echo "active-work.md の変更を検出しました。フォーマット検証を実行します。"
            bash scripts/check-active-work-format.sh
          else
            echo "active-work.md は変更されていません。スキップします。"
          fi

  placeholder-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect unfilled placeholder entries
        run: |
          PLACEHOLDER_COUNT=$(grep -c '（記入してください）' .claude-pipeline/active-work.md 2>/dev/null || echo 0)
          if [ "$PLACEHOLDER_COUNT" -gt 0 ]; then
            echo "::warning::担当機能エリア未記入が ${PLACEHOLDER_COUNT} 件あります。"
            grep -n '（記入してください）' .claude-pipeline/active-work.md | while IFS= read -r line; do
              echo "::warning::  $line"
            done
            echo "worktree 作成後に active-work.md の「担当機能エリア」を記入してください。"
          else
            echo "✅ プレースホルダーなし"
          fi

  zombie-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect zombie IN_PROGRESS entries
        run: |
          # active-work.md の IN_PROGRESS 行のブランチがリモートに存在するか確認
          # 存在しないブランチ = マージ後にcleanupされなかったゾンビ行
          git fetch origin --prune 2>/dev/null || true

          ZOMBIE_COUNT=0
          while IFS= read -r BRANCH; do
            [ -z "$BRANCH" ] && continue
            # リモートブランチの存在確認
            if ! git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
              echo "::warning::ゾンビ行検出: '$BRANCH' は IN_PROGRESS ですがリモートブランチが存在しません"
              ZOMBIE_COUNT=$((ZOMBIE_COUNT + 1))
            else
              echo "✅ $BRANCH — リモートブランチ存在確認"
            fi
          done < <(python3 -c "
          import re, sys
          content = open('.claude-pipeline/active-work.md', encoding='utf-8').read()
          for line in content.splitlines():
              m = re.match(r'\|\s*(\S+)\s*\|.*\|\s*IN_PROGRESS\s*\|', line)
              if m:
                  print(m.group(1))
          " 2>/dev/null)

          if [ "$ZOMBIE_COUNT" -gt 0 ]; then
            echo ""
            echo "⚠️  ゾンビ行が ${ZOMBIE_COUNT} 件検出されました。"
            echo "   該当ブランチのマージ後に cleanup-worktree.sh が実行されなかった可能性があります。"
            echo "   active-work.md を手動で更新するか、cleanup-worktree.sh を実行してください。"
            # 警告のみ（fail させない）— ゾンビがあっても他の作業をブロックしない
            exit 0
          else
            echo "✅ ゾンビ行なし"
          fi
