name: Diag - Backend logs tail

# POST /api/v1/companies が 500 を返す原因調査用（使い捨て）

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Tail backend container logs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Last 200 lines of backend stderr ==="
            docker logs astro-webapp-backend-1 --tail 200 2>&1 | tail -200
