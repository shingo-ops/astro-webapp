name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # LP (lp/) build + rsync to VPS
      # 静的サイト salesanchor.jp の本体（Astro 4 で 4 ページ生成）
      # ============================================
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lp/package-lock.json

      - name: Build LP
        run: |
          cd lp
          npm ci
          npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync LP build to VPS
        run: |
          rsync -avz --delete \
            lp/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ubuntu/salesanchor/www/salesanchor/

      # ============================================
      # 既存: VPS 上で git pull + docker compose up + migrations
      # ============================================
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "============================================"
            echo "Starting deployment..."
            echo "============================================"

            cd /home/ubuntu/salesanchor

            echo "Step 1: Pulling latest code from GitHub..."
            git pull origin main

            echo "Step 2: Setting Meta Webhook environment variables..."
            grep -q "META_VERIFY_TOKEN" .env 2>/dev/null || \
              echo "META_VERIFY_TOKEN=${{ secrets.META_VERIFY_TOKEN }}" >> .env
            grep -q "META_APP_SECRET" .env 2>/dev/null || \
              echo "META_APP_SECRET=${{ secrets.META_APP_SECRET }}" >> .env

            echo "Step 3: Rebuilding and restarting containers..."
            docker compose up -d --build

            echo "Step 4: Waiting for services to become healthy..."
            sleep 20

            echo "Step 5: Running database migrations..."
            # scripts/ と migrations/ は backend イメージに含まれていないため都度コピー
            docker cp scripts astro-webapp-backend-1:/app/
            docker cp migrations astro-webapp-backend-1:/app/

            # Meta Webhook Phase 2: meta_messages テーブル（idempotent）
            docker exec -w /app astro-webapp-backend-1 python scripts/migrate_meta.py

            # Meta Webhook Phase 2: 冪等性・リード重複防止インデックス（idempotent）
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/013_add_meta_webhook_idempotency.sql

            # Phase 1 再設計: current_tenant_id() 関数定義（CREATE OR REPLACE、idempotent）
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/014_create_current_tenant_id_function.sql

            # Phase 1 再設計: permissions 拡張 + menu.* 19件 seed
            #   ALTER TABLE ADD COLUMN IF NOT EXISTS + INSERT ON CONFLICT DO NOTHING でidempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/018_extend_permissions_with_menu_grain.sql

            # Phase 1 再設計: システム管理者/オーナーの is_system フラグ修正
            #   非テンプレート化済み。pg_namespace 走査で全tenant_NNN schemaへ自動適用。
            #   WHERE is_system = FALSE により再実行は no-op（冪等）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/023_fix_system_admin_is_system_flag.sql

            # Phase 1 再設計 スプリントC: staff.* / bots.* 権限8件追加
            #   INSERT ON CONFLICT (key) DO NOTHING でidempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/024_add_staff_bots_permissions.sql

            # Phase 1 再設計 follow-up: オーナー/システム管理者に全権限を再割当
            #   migration 018 / 024 で追加された permissions が既存ロールに
            #   紐付いていない問題を解消。ON CONFLICT DO NOTHING でidempotent。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/025_resync_owner_admin_all_permissions.sql

            # Phase 1-B-1: 連絡ツール別テーブル customer_contact_channels 作成
            #   非テンプレート、pg_namespace 走査で全tenant_NNNへ適用、idempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/026_create_customer_contact_channels.sql

            # Phase 1-B-1: 既存 primary_contact_channel を contact_channels に backfill
            #   WHERE NOT EXISTS で既に行があればスキップ、idempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/027_backfill_customer_contact_channels.sql

            # Phase 1-B-2 Step 2: companies テーブル作成
            #   非テンプレート、pg_namespace 走査で全tenant_NNNへ適用、idempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/028_create_companies.sql

            # Phase 1-B-2 Step 2: contacts テーブル作成（companies 依存）
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/029_create_contacts.sql

            # Phase 1-B-2 Step 2: companies/contacts 副テーブル 5本
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/030_create_company_contact_subtables.sql

            # Phase 1-B-2 Step 2: 旧customer → 新company/contact マッピングテーブル
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/031_create_customer_migration_map.sql

            # Phase 1-B-2 Step 4: 下流テーブル FK 切替
            #   deals/orders/quotes/invoices に company_id/contact_id を追加、
            #   _customer_migration_map から backfill、FK 制約を追加。
            #   customer_id 列は Step 5 まで保持（非破壊）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/032_add_company_contact_to_downstream.sql

            # Phase 1-B-2 Step 5a: companies.is_individual カラム削除
            #   個人/法人の区別撤廃（しんごさん判断 2026-04-24）
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/033_drop_companies_is_individual.sql

            # Phase 1-B-2 Step 5c-3 follow-up (PR #150 / F3):
            #   _customer_migration_map.new_contact_id に UNIQUE 制約追加。
            #   customer_resolver.resolve_customer_id_from_contact() の決定性を
            #   DB レベルで構造的に保証する。重複データがあれば WARNING で SKIP し
            #   制約は付与されない（運用フォロー要）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/034_add_unique_new_contact_id_to_customer_migration_map.sql

            # Phase 1-B-2 Step 5d / PR β:
            #   下流テーブル (deals/orders/quotes/invoices) から旧 customer_id 列を完全撤去。
            #   precondition で全テナントの company_id IS NULL = 0 を assert し、
            #   FAIL なら EXCEPTION で停止（副作用なし）。PASS なら NOT NULL 化 + DROP COLUMN。
            #   _customer_migration_map は migration 036 で別途 DROP（PR γ）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/035_drop_customer_id_from_downstream.sql

            # Phase 1-B-2 Step 5d / PR γ:
            #   _customer_migration_map テーブルを撤去。035 で customer_id 列が消えており、
            #   resolver.py は本 PR で削除済のため逆引き参照は完全に無くなる。
            #   precondition: 全テナントで customer_id 列が無いことを確認（035 適用済保証）。
            #   テーブルが既に存在しない場合は IF EXISTS で no-op（idempotent）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/036_drop_customer_migration_map.sql

            # Phase 1-B-2 Step 5c-2 follow-up (PR #163 / Critical fix):
            #   contacts.status の CHECK 制約に 'pending_dedup_review' を追加。
            #   companies.status は migration 028 で当初から 4 値だったが contacts は
            #   3 値のままだったため、PR #163 の解消フロー UI から
            #   status='pending_dedup_review' を保存すると 500 になっていた問題を解消。
            #   pg_constraint で既存制約を動的検出 → DROP+ADD で更新、再実行 no-op。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/037_add_pending_dedup_review_to_contacts_check.sql

            # Phase 1-C M-MVP (Q4 / Q5 / Q9 確定 / 2026-04-28):
            #   products テーブルに TCG B2B 輸出向け 11 列を追加。
            #     jan_code / card_number / expansion_code / rarity / language
            #     unit_price_usd / unit_price_eur / image_url
            #     is_archived / archived_at / supplier_default_id
            #   全列 NULL 許可（既存データへの影響なし）。
            #   PARTIAL UNIQUE 索引 2 本（product_code / jan_code）+ 検索用索引 3 本。
            #   ADD COLUMN IF NOT EXISTS / CREATE INDEX IF NOT EXISTS で再実行 no-op。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/038_add_products_phase1c_columns.sql

            # 新しいマイグレーションはここに追加してください（idempotent必須）
            # NOTE: 015-017 / 019-022 はテンプレート（{schema}プレースホルダ含む）のため
            #       deploy.yml では自動実行しない。新テナント作成は backend/app/services/tenant.py
            #       のテンプレートが全テーブルを作るので新テナントには追従不要。

            echo "Step 6: Health check..."
            docker exec astro-webapp-backend-1 python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" || (echo "Health check failed!" && exit 1)

            echo "Step 7: Checking container status..."
            docker compose ps

            echo "Step 8: Cleaning up old Docker images..."
            docker image prune -f

            echo "============================================"
            echo "Deployment completed successfully!"
            echo "============================================"

      - name: Verify deployment
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -sf https://jarvis-claude.uk/api/health || echo "External health check warning"

      - name: Deployment Failure Notification
        if: failure()
        run: |
          echo "Deployment failed!"
          echo "Please check the logs above for details."
          exit 1
