name: Deploy to VPS

on:
  push:
    branches:
      - main

# 連続リリースで deploy.yml が並行実行されると、Docker コンテナ名衝突
# （Conflict. The container name "/astro-webapp-backend-1" is already in use）で
# backend が起動できず 502 になる（2026-06-02 #1390/1395/1396 の 9 分間連続マージで実発生）。
# 同一グループで直列化し、並行実行を防ぐ。
# cancel-in-progress: false — migration 実行中に後続がキャンセルすると DB が
# 中途半端な状態になる危険があるため、キャンセルせずキュー待ちにする（ADR-092）。
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # LP (lp/) build + rsync to VPS
      # 静的サイト salesanchor.jp の本体（Astro 4 で 4 ページ生成）
      # ============================================
      - name: Checkout
        uses: actions/checkout@v4

      # ADR-082: フロントのみのデプロイでは DB マイグレーション（冪等・約60ステップ）を
      # スキップして所要時間を短縮する。backend/migrations/scripts/compose/deploy.yml の
      # いずれかが変わった場合のみ migrations を実行（保守的ゲート・判定不能時は安全側=実行）。
      - name: Detect backend / migration changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            migrations:
              - 'migrations/**'
              - 'scripts/**'
              - 'backend/**'
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node.js 22 LTS（2027-04 EOL）。Astro 4.x は Node 18+ 対応のため互換。
          # 他ワークフロー（chromatic/e2e/frontend-check）と統一。
          # GHA Node.js 20 廃止対応 2026-06-16（ADR-n/a）。
          node-version: '22'
          cache: npm
          cache-dependency-path: lp/package-lock.json

      - name: Build LP
        run: |
          cd lp
          npm ci
          npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync LP build to VPS
        run: |
          rsync -avz --delete \
            lp/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ubuntu/salesanchor/www/salesanchor/

      # ============================================
      # 既存: VPS 上で git pull + docker compose up + migrations
      #
      # 2026-05-22 hotfix: 旧 migration ステップを part 1 / part 2 に分割（expression length 上限回避）
      # 2026-06-02 改善: part 1 / part 2 を scripts/run_all_migrations.sh に統合
      #   - 新マイグレーション追加時は deploy.yml ではなく run_all_migrations.sh に追記する
      #   - deploy.yml の肥大化防止 + ADR-045 パターン（追記漏れ）の根本解消
      #   ステップ構成:
      #     1. Deploy to VPS (code + env + docker compose)
      #     2. Run database migrations  ← scripts/run_all_migrations.sh を呼ぶだけ
      #     3. Finalize (health check + cleanup)
      # ============================================
      - name: Deploy to VPS (code + env + docker compose)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "============================================"
            echo "Starting deployment (code + env + docker compose)..."
            echo "============================================"

            cd /home/ubuntu/salesanchor

            echo "Step 1: Pulling latest code from GitHub..."
            # divergent branches エラー防止: fetch + reset --hard で常に remote main に合わせる
            git fetch origin main
            git reset --hard origin/main

            echo "Step 2: Syncing Meta Webhook environment variables from GitHub Secrets..."
            # ADR-025: GitHub Secrets を更新したら必ず VPS .env に反映する。
            # 旧パターン `grep -q "^K=" .env || echo "K=V" >> .env` は
            # "既存値があれば上書きしない" 設計のため、Secret を更新しても
            # VPS の .env が古い値のまま残った（2026-05-01 の METADATA_FERNET_KEY
            # ローテーションが反映されず、毎日の token refresh が失敗した直接原因）。
            #
            # 新パターン: 対象キーの既存行を anchored 削除 → 最新値を append。
            #   - `^KEY=` anchor によりコメント行 (`#KEY=...`) や部分一致
            #     (`META_APP_ID_OLD=...`) を誤って削除しない
            #   - .env 内の他のキー（DB_PASSWORD 等 VPS で手動設定したもの）には触れない
            #   - 冪等: 同じ値で再実行しても最終状態は同じ
            #   - quoted heredoc (`<<'ENV_EOF'`) でシェル変数展開を抑止し、
            #     Secret 値をそのまま literal text として書き込む。
            #     `${{ secrets.X }}` 自体は GitHub Actions が SSH 送信前に展開する。
            #   - Phase 1-D Sprint 1: METADATA_FERNET_KEY 紛失は DB token を永久に
            #     復号不能化するリスクが極めて高い。GitHub Secrets と別の安全な
            #     バックアップの二重保管必須。ローテーション手順は
            #     docs/operations/meta_encryption_key_rotation.md 参照。
            touch .env
            sed -i.bak \
              -e '/^META_VERIFY_TOKEN=/d' \
              -e '/^META_APP_SECRET=/d' \
              -e '/^META_APP_ID=/d' \
              -e '/^META_OAUTH_REDIRECT_URI=/d' \
              -e '/^METADATA_FERNET_KEY=/d' \
              -e '/^GEMINI_API_KEY=/d' \
              -e '/^ADMIN_NOTIFICATION_DISCORD_WEBHOOK=/d' \
              -e '/^GOOGLE_CALENDAR_CLIENT_ID=/d' \
              -e '/^GOOGLE_CALENDAR_CLIENT_SECRET=/d' \
              -e '/^GOOGLE_CALENDAR_REDIRECT_URI=/d' \
              -e '/^DISCORD_BOT_TOKEN_4=/d' \
              .env
            rm -f .env.bak
            # YAML `|` ブロックの共通インデント (12 スペース) はパース時に自動除去される。
            # したがって heredoc 本文の各行は実行時に行頭スペースなしで届く。
            # Sprint 4 (F4): GEMINI_API_KEY / ADMIN_NOTIFICATION_DISCORD_WEBHOOK は
            #   ADR-025 trap 回避のため同じ「sed 削除 → append」パターンに合流。
            #   secret 未設定でも空値で append される（後段 LLM サービスは空判定して
            #   parsed_rule_only に graceful degrade、AC4.5）。
            cat >> .env <<'ENV_EOF'
            META_VERIFY_TOKEN=${{ secrets.META_VERIFY_TOKEN }}
            META_APP_SECRET=${{ secrets.META_APP_SECRET }}
            META_APP_ID=${{ secrets.META_APP_ID }}
            META_OAUTH_REDIRECT_URI=${{ secrets.META_OAUTH_REDIRECT_URI }}
            METADATA_FERNET_KEY=${{ secrets.METADATA_FERNET_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ADMIN_NOTIFICATION_DISCORD_WEBHOOK=${{ secrets.ADMIN_NOTIFICATION_DISCORD_WEBHOOK }}
            GOOGLE_CALENDAR_CLIENT_ID=${{ secrets.GOOGLE_CALENDAR_CLIENT_ID }}
            GOOGLE_CALENDAR_CLIENT_SECRET=${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}
            GOOGLE_CALENDAR_REDIRECT_URI=${{ secrets.GOOGLE_CALENDAR_REDIRECT_URI }}
            DISCORD_BOT_TOKEN_4=${{ secrets.DISCORD_BOT_TOKEN_4 }}
            ENV_EOF

            echo "Step 3: Rebuilding and restarting containers..."
            # build と up を分離してダウンタイムを最小化する。
            # --build を up と一体で実行すると旧コンテナ停止後にビルドが走り（最大2分程度）
            # その間 nginx が 502 を返す問題があった（2026-05-30 障害）。
            # build を先に完了させてから up（切り替えのみ）を実行することで
            # ダウンタイムをコンテナ再起動の数秒に短縮する。
            #
            # Docker bridge 一時エラー対策（2026-06-02 調査）:
            # VPS カーネルが "adding interface veth to bridge docker0 failed: Device does not exist"
            # を返す場合がある（一時的な netns 状態異常）。15秒待ってリトライすると解消する。
            BUILD_OK=false
            for _build_attempt in 1 2 3; do
              if docker compose build; then
                BUILD_OK=true
                break
              fi
              echo "Build attempt ${_build_attempt} failed. 15秒後にリトライ..."
              sleep 15
            done
            if [ "$BUILD_OK" != "true" ]; then
              echo "docker compose build が3回失敗しました"
              exit 1
            fi
            # build 完了後・up 直前に、graceful stop に失敗した/ハッシュ付き重複の
            # app 系コンテナを force 削除し、単一・クリーンな状態を保証する。
            #  - 名前衝突による compose up 失敗を防ぐ（2026-05-30 frontend / 2026-06-02 backend で 502 障害）
            #  - discord-gateway の重複起動による Discord 再接続storm→token reset を防ぐ
            # build 後に置くことで削除→up の間（数秒）のみのダウンタイムに抑える。
            # postgres / redis / nginx / certbot は状態を持つため対象外。
            for _svc in backend frontend celery-worker celery-beat discord-gateway; do
              docker ps -a --filter "name=astro-webapp-${_svc}" --format "{{.ID}}" | xargs -r docker rm -f 2>/dev/null || true
            done
            docker compose up -d --remove-orphans

            echo "Step 4: Waiting for backend to become healthy (max 120s)..."
            timeout 120 bash -c '
              until docker inspect --format="{{.State.Health.Status}}" astro-webapp-backend-1 2>/dev/null | grep -q "healthy"; do
                sleep 5
                echo "  ...waiting for backend healthcheck..."
              done
            ' || echo "Backend health wait timed out after 120s, proceeding with migrations..."

            echo "Step 4b: Reloading nginx to refresh DNS resolution (zero-downtime)..."
            docker exec astro-webapp-nginx-1 nginx -s reload
            echo "nginx reload done."

            echo "============================================"
            echo "Code + env + docker compose phase done."
            echo "============================================"

      # ADR-082: backend/migration 系の変更がある場合のみ実行（フロントのみは skip）
      # 旧: part 1 / part 2 の 2 ステップ（約 600 行）→ scripts/run_all_migrations.sh に統合
      # 新マイグレーション追加時は deploy.yml ではなく scripts/run_all_migrations.sh に追記する
      - name: Run database migrations
        if: ${{ success() && steps.changes.outputs.migrations == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "============================================"
            echo "Running database migrations..."
            echo "============================================"

            cd /home/ubuntu/salesanchor
            bash scripts/run_all_migrations.sh

            echo "============================================"
            echo "Migrations done."
            echo "============================================"

      # ADR-082: ヘルスチェック・監視確認・イメージ prune はマイグレーション skip 時も
      # 必ず走らせる必要があるため、マイグレーションから分離して常時実行する。
      # （フロントのみのデプロイでも本番の健全性検証が抜けない）
      - name: Finalize (health check + cleanup)
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/salesanchor

            if [ "${{ steps.changes.outputs.migrations }}" != "true" ]; then
              echo "ℹ️  ADR-082: backend/migration 変更なし → DB マイグレーションは skip しました（フロントのみのデプロイ）。"
            fi

            echo "Step 6: Health check..."
            docker exec astro-webapp-backend-1 python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" || (echo "Health check failed!" && exit 1)

            echo "Step 7: Checking container status..."
            docker compose ps

            echo "Step 7b: Monitoring stack health check..."
            # prometheus が起動しているか確認
            if docker ps --format '{{.Names}}' | grep -q 'prometheus'; then
              echo "  ✅ Prometheus container running"
              # backend /metrics エンドポイントが有効か（コンテナ内から確認）
              docker exec astro-webapp-backend-1 python -c \
                "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/metrics'); print('  ✅ /metrics status:', r.status)" \
                || echo "  ⚠️  /metrics not yet available (will be scraped after first request)"
            else
              echo "  ℹ️  Prometheus not running in this stack (monitoring stack may be separate)"
            fi
            # grafana が起動しているか確認
            if docker ps --format '{{.Names}}' | grep -q 'grafana'; then
              echo "  ✅ Grafana container running"
            else
              echo "  ℹ️  Grafana not running in this stack"
            fi

            echo "Step 8: Cleaning up old Docker images..."
            docker image prune -f

            echo "============================================"
            echo "Deployment completed successfully!"
            echo "============================================"

      - name: Verify deployment
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            curl -sf https://jarvis-claude.uk/api/health || echo "External health check warning"

            # ADR-045: migration 055 (granted_scopes) 適用検証
            #   全 active テナントスキーマで tenant_meta_config.granted_scopes 列が
            #   存在し、かつ NULL のレコードが残っていないことを確認する。
            #   missing/NULL が 1 件でもあれば RAISE EXCEPTION で本ステップを失敗させる。
            echo "Verifying ADR-045 migration 055 (granted_scopes)..."
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 <<'VERIFY_EOF'
            DO $$
            DECLARE
                r RECORD;
                missing_col_count INT := 0;
                null_rows_total INT := 0;
                cnt INT;
            BEGIN
                FOR r IN
                    SELECT
                        id,
                        tenant_code,
                        format('tenant_%s', lpad(id::text, 3, '0')) AS schema
                    FROM public.tenants
                    WHERE is_active = true
                    ORDER BY id
                LOOP
                    IF NOT EXISTS (
                        SELECT 1 FROM information_schema.tables
                        WHERE table_schema = r.schema
                          AND table_name = 'tenant_meta_config'
                    ) THEN
                        CONTINUE;
                    END IF;

                    IF NOT EXISTS (
                        SELECT 1 FROM information_schema.columns
                        WHERE table_schema = r.schema
                          AND table_name = 'tenant_meta_config'
                          AND column_name = 'granted_scopes'
                    ) THEN
                        RAISE WARNING 'Missing granted_scopes column: schema=% tenant_code=%',
                            r.schema, r.tenant_code;
                        missing_col_count := missing_col_count + 1;
                        CONTINUE;
                    END IF;

                    EXECUTE format(
                        'SELECT COUNT(*) FROM %I.tenant_meta_config WHERE granted_scopes IS NULL',
                        r.schema
                    ) INTO cnt;
                    IF cnt > 0 THEN
                        RAISE WARNING 'NULL granted_scopes rows: schema=% tenant_code=% count=%',
                            r.schema, r.tenant_code, cnt;
                        null_rows_total := null_rows_total + cnt;
                    END IF;
                END LOOP;

                IF missing_col_count > 0 OR null_rows_total > 0 THEN
                    RAISE EXCEPTION
                        'ADR-045 verification failed: missing_col=% null_rows=%',
                        missing_col_count, null_rows_total;
                END IF;

                RAISE NOTICE 'ADR-045 verification OK';
            END
            $$;
            VERIFY_EOF

      - name: Deployment Failure Notification
        if: failure()
        run: |
          echo "Deployment failed!"
          echo "Please check the logs above for details."
          exit 1
