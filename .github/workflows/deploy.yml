name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # LP (lp/) build + rsync to VPS
      # 静的サイト salesanchor.jp の本体（Astro 4 で 4 ページ生成）
      # ============================================
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lp/package-lock.json

      - name: Build LP
        run: |
          cd lp
          npm ci
          npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync LP build to VPS
        run: |
          rsync -avz --delete \
            lp/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ubuntu/salesanchor/www/salesanchor/

      # ============================================
      # 既存: VPS 上で git pull + docker compose up + migrations
      # ============================================
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "============================================"
            echo "Starting deployment..."
            echo "============================================"

            cd /home/ubuntu/salesanchor

            echo "Step 1: Pulling latest code from GitHub..."
            # divergent branches エラー防止: fetch + reset --hard で常に remote main に合わせる
            git fetch origin main
            git reset --hard origin/main

            echo "Step 2: Syncing Meta Webhook environment variables from GitHub Secrets..."
            # ADR-025: GitHub Secrets を更新したら必ず VPS .env に反映する。
            # 旧パターン `grep -q "^K=" .env || echo "K=V" >> .env` は
            # "既存値があれば上書きしない" 設計のため、Secret を更新しても
            # VPS の .env が古い値のまま残った（2026-05-01 の METADATA_FERNET_KEY
            # ローテーションが反映されず、毎日の token refresh が失敗した直接原因）。
            #
            # 新パターン: 対象キーの既存行を anchored 削除 → 最新値を append。
            #   - `^KEY=` anchor によりコメント行 (`#KEY=...`) や部分一致
            #     (`META_APP_ID_OLD=...`) を誤って削除しない
            #   - .env 内の他のキー（DB_PASSWORD 等 VPS で手動設定したもの）には触れない
            #   - 冪等: 同じ値で再実行しても最終状態は同じ
            #   - quoted heredoc (`<<'ENV_EOF'`) でシェル変数展開を抑止し、
            #     Secret 値をそのまま literal text として書き込む。
            #     `${{ secrets.X }}` 自体は GitHub Actions が SSH 送信前に展開する。
            #   - Phase 1-D Sprint 1: METADATA_FERNET_KEY 紛失は DB token を永久に
            #     復号不能化するリスクが極めて高い。GitHub Secrets と Bitwarden の
            #     二重保管必須。ローテーション手順は
            #     docs/operations/meta_encryption_key_rotation.md 参照。
            touch .env
            sed -i.bak \
              -e '/^META_VERIFY_TOKEN=/d' \
              -e '/^META_APP_SECRET=/d' \
              -e '/^META_APP_ID=/d' \
              -e '/^META_OAUTH_REDIRECT_URI=/d' \
              -e '/^METADATA_FERNET_KEY=/d' \
              -e '/^GEMINI_API_KEY=/d' \
              -e '/^ADMIN_NOTIFICATION_DISCORD_WEBHOOK=/d' \
              .env
            rm -f .env.bak
            # YAML `|` ブロックの共通インデント (12 スペース) はパース時に自動除去される。
            # したがって heredoc 本文の各行は実行時に行頭スペースなしで届く。
            # Sprint 4 (F4): GEMINI_API_KEY / ADMIN_NOTIFICATION_DISCORD_WEBHOOK は
            #   ADR-025 trap 回避のため同じ「sed 削除 → append」パターンに合流。
            #   secret 未設定でも空値で append される（後段 LLM サービスは空判定して
            #   parsed_rule_only に graceful degrade、AC4.5）。
            cat >> .env <<'ENV_EOF'
            META_VERIFY_TOKEN=${{ secrets.META_VERIFY_TOKEN }}
            META_APP_SECRET=${{ secrets.META_APP_SECRET }}
            META_APP_ID=${{ secrets.META_APP_ID }}
            META_OAUTH_REDIRECT_URI=${{ secrets.META_OAUTH_REDIRECT_URI }}
            METADATA_FERNET_KEY=${{ secrets.METADATA_FERNET_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ADMIN_NOTIFICATION_DISCORD_WEBHOOK=${{ secrets.ADMIN_NOTIFICATION_DISCORD_WEBHOOK }}
            ENV_EOF

            echo "Step 3: Rebuilding and restarting containers..."
            docker compose down --remove-orphans || true
            docker compose up -d --build --remove-orphans

            echo "Step 4: Waiting for services to become healthy..."
            sleep 20

            echo "Step 5: Running database migrations..."
            # scripts/ と migrations/ は backend イメージに含まれていないため都度コピー
            docker cp scripts astro-webapp-backend-1:/app/
            docker cp migrations astro-webapp-backend-1:/app/

            # Meta Webhook Phase 2: meta_messages テーブル（idempotent）
            docker exec -w /app astro-webapp-backend-1 python scripts/migrate_meta.py

            # Meta Webhook Phase 2: 冪等性・リード重複防止インデックス（idempotent）
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/013_add_meta_webhook_idempotency.sql

            # Phase 1 再設計: current_tenant_id() 関数定義（CREATE OR REPLACE、idempotent）
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/014_create_current_tenant_id_function.sql

            # Phase 1 再設計: permissions 拡張 + menu.* 19件 seed
            #   ALTER TABLE ADD COLUMN IF NOT EXISTS + INSERT ON CONFLICT DO NOTHING でidempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/018_extend_permissions_with_menu_grain.sql

            # Phase 1 再設計: システム管理者/オーナーの is_system フラグ修正
            #   非テンプレート化済み。pg_namespace 走査で全tenant_NNN schemaへ自動適用。
            #   WHERE is_system = FALSE により再実行は no-op（冪等）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/023_fix_system_admin_is_system_flag.sql

            # Phase 1 再設計 スプリントC: staff.* / bots.* 権限8件追加
            #   INSERT ON CONFLICT (key) DO NOTHING でidempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/024_add_staff_bots_permissions.sql

            # Phase 1 再設計 follow-up: オーナー/システム管理者に全権限を再割当
            #   migration 018 / 024 で追加された permissions が既存ロールに
            #   紐付いていない問題を解消。ON CONFLICT DO NOTHING でidempotent。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/025_resync_owner_admin_all_permissions.sql

            # Phase 1-B-1: 連絡ツール別テーブル customer_contact_channels 作成
            #   非テンプレート、pg_namespace 走査で全tenant_NNNへ適用、idempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/026_create_customer_contact_channels.sql

            # Phase 1-B-1: 既存 primary_contact_channel を contact_channels に backfill
            #   WHERE NOT EXISTS で既に行があればスキップ、idempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/027_backfill_customer_contact_channels.sql

            # Phase 1-B-2 Step 2: companies テーブル作成
            #   非テンプレート、pg_namespace 走査で全tenant_NNNへ適用、idempotent
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/028_create_companies.sql

            # Phase 1-B-2 Step 2: contacts テーブル作成（companies 依存）
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/029_create_contacts.sql

            # Phase 1-B-2 Step 2: companies/contacts 副テーブル 5本
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/030_create_company_contact_subtables.sql

            # Phase 1-B-2 Step 2: 旧customer → 新company/contact マッピングテーブル
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/031_create_customer_migration_map.sql

            # Phase 1-B-2 Step 4: 下流テーブル FK 切替
            #   deals/orders/quotes/invoices に company_id/contact_id を追加、
            #   _customer_migration_map から backfill、FK 制約を追加。
            #   customer_id 列は Step 5 まで保持（非破壊）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/032_add_company_contact_to_downstream.sql

            # Phase 1-B-2 Step 5a: companies.is_individual カラム削除
            #   個人/法人の区別撤廃（しんごさん判断 2026-04-24）
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/033_drop_companies_is_individual.sql

            # Phase 1-B-2 Step 5c-3 follow-up (PR #150 / F3):
            #   _customer_migration_map.new_contact_id に UNIQUE 制約追加。
            #   customer_resolver.resolve_customer_id_from_contact() の決定性を
            #   DB レベルで構造的に保証する。重複データがあれば WARNING で SKIP し
            #   制約は付与されない（運用フォロー要）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/034_add_unique_new_contact_id_to_customer_migration_map.sql

            # Phase 1-B-2 Step 5d / PR β:
            #   下流テーブル (deals/orders/quotes/invoices) から旧 customer_id 列を完全撤去。
            #   precondition で全テナントの company_id IS NULL = 0 を assert し、
            #   FAIL なら EXCEPTION で停止（副作用なし）。PASS なら NOT NULL 化 + DROP COLUMN。
            #   _customer_migration_map は migration 036 で別途 DROP（PR γ）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/035_drop_customer_id_from_downstream.sql

            # Phase 1-B-2 Step 5d / PR γ:
            #   _customer_migration_map テーブルを撤去。035 で customer_id 列が消えており、
            #   resolver.py は本 PR で削除済のため逆引き参照は完全に無くなる。
            #   precondition: 全テナントで customer_id 列が無いことを確認（035 適用済保証）。
            #   テーブルが既に存在しない場合は IF EXISTS で no-op（idempotent）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/036_drop_customer_migration_map.sql

            # Phase 1-B-2 Step 5c-2 follow-up (PR #163 / Critical fix):
            #   contacts.status の CHECK 制約に 'pending_dedup_review' を追加。
            #   companies.status は migration 028 で当初から 4 値だったが contacts は
            #   3 値のままだったため、PR #163 の解消フロー UI から
            #   status='pending_dedup_review' を保存すると 500 になっていた問題を解消。
            #   pg_constraint で既存制約を動的検出 → DROP+ADD で更新、再実行 no-op。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/037_add_pending_dedup_review_to_contacts_check.sql

            # Phase 1-C M-MVP (Q4 / Q5 / Q9 確定 / 2026-04-28):
            #   products テーブルに TCG B2B 輸出向け 11 列を追加。
            #     jan_code / card_number / expansion_code / rarity / language
            #     unit_price_usd / unit_price_eur / image_url
            #     is_archived / archived_at / supplier_default_id
            #   全列 NULL 許可（既存データへの影響なし）。
            #   PARTIAL UNIQUE 索引 2 本（product_code / jan_code）+ 検索用索引 3 本。
            #   ADD COLUMN IF NOT EXISTS / CREATE INDEX IF NOT EXISTS で再実行 no-op。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/038_add_products_phase1c_columns.sql

            # Meta App Review §B3: data_deletion_logs テーブル作成
            #   public schema 配下（テナント横断）。
            #   CREATE TABLE / INDEX / TRIGGER すべて IF NOT EXISTS / OR REPLACE で idempotent。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/039_create_data_deletion_logs.sql

            # Phase 1-D Sprint 1: 全テナントに tenant_meta_config テーブル作成 +
            #   public.permissions に Meta Inbox 権限 4 件 seed（migration 040 + 042）
            #   IF NOT EXISTS / ON CONFLICT DO NOTHING で idempotent。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_meta_inbox_phase1d.py

            # Phase 1-D Sprint 4: 全テナントの meta_messages に 9 列追加（migration 041）
            #   ADD COLUMN IF NOT EXISTS / CREATE INDEX IF NOT EXISTS で idempotent。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_meta_inbox_phase1d_sprint4.py

            # Phase 1-E F16-S6: public.meta_page_routing テーブル作成 +
            #   全テナントに同期トリガ + backfill（migration 043 + 044）
            #   CREATE TABLE/INDEX IF NOT EXISTS / CREATE OR REPLACE FUNCTION / ON CONFLICT で idempotent。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_meta_page_routing.py

            # Phase 1-E F14-S5: 全テナントの meta_messages に page_id 列追加（migration 045）
            #   ADD COLUMN IF NOT EXISTS / CREATE INDEX IF NOT EXISTS で idempotent。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_meta_messages_page_id.py

            # ADR-015 段階分割 Phase 1: leads カラム追加 / lead_playbook テーブル新設 /
            #   customer_contact_channels.external_id 追加
            #   Pythonテンプレートランナー（{schema}プレースホルダを全テナントに展開）。
            #   ADD COLUMN IF NOT EXISTS / CREATE TABLE IF NOT EXISTS で idempotent。
            docker exec -e TENANT_CODE=highlife-jpn -w /app astro-webapp-backend-1 \
              python scripts/migrate_adr015_lead_foundation.py

            # GAS 版互換ロール移行: 「メンバー」→「CS」再割当 + ロール正規化（冪等）
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_roles_gas_compat.py

            # ADR-021 Sprint 2: 全テナントに order_financials テーブル新設（migration 047）
            #   CREATE TABLE IF NOT EXISTS / CREATE INDEX IF NOT EXISTS / RLS DO ブロックで idempotent。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_adr021_sprint2_financials.py

            # ADR-021 Sprint 3: 全テナントに order_shipping_details テーブル新設（migration 048）
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_adr021_sprint3_shipping.py

            # ADR-021 Sprint 4: 全テナントに order_purchase_details テーブル新設（migration 049）
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_adr021_sprint4_purchase.py

            # ADR-021 Sprint 5: 全テナントに commissions + staff.is_employee 追加（migration 050）
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_adr021_sprint5_commissions.py

            # ADR-021 J1 fix: 全テナントの orders.status='confirmed' を 'pending' に統合（migration 051）
            #   WHERE status='confirmed' で自然に冪等。2 回目以降は 0 行更新。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_adr021_remove_confirmed_status.py

            # ADR-026: 全テナントの meta_messages.message_id を VARCHAR(100) → TEXT（migration 052）
            #   data_type='text' 確認済みテナントは skip する冪等設計。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_meta_messages_message_id_to_text.py

            # ADR-027: users テーブルに locale カラム追加（ユーザー個人の言語設定）
            #   ADD COLUMN IF NOT EXISTS / UPDATE で idempotent。
            #   review@salesanchor.jp の locale を 'en' に設定（撮影用）。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/053_add_users_locale.sql

            # ADR-033: users テーブルに theme カラム追加（ユーザー個人のテーマ設定）
            #   ADD COLUMN IF NOT EXISTS / UPDATE で idempotent。
            #   全ユーザーのデフォルトは 'light'。review@salesanchor.jp も 'light' に明示設定。
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 \
              < migrations/054_add_users_theme.sql

            # ADR-041 / ADR-045: 全テナントの tenant_meta_config に granted_scopes JSONB 追加 + backfill（migration 055）
            #   ADD COLUMN IF NOT EXISTS + UPDATE WHERE granted_scopes IS NULL で idempotent。
            #   ADR-045 で deploy.yml に追加された自動実行ステップ。未適用のままだと
            #   tenant_meta_config 系 API が UndefinedColumnError で HTTP 500 になる。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_adr041_granted_scopes.py

            # migration 009: 全テナントに notification_channels / notification_logs /
            #   staff_reports / archives テーブルを追加（CREATE TABLE IF NOT EXISTS + RLS、idempotent）
            #   tenant_006 は 2026-05-15 に手動適用済み。以降の新テナントは setup_tenant.py 経由。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_009_phase4_tenant_tables.py

            # migration 011 (Phase 5): 全テナントに shifts / buddy_pairs / buddy_feedbacks /
            #   badge_definitions / user_badges / erp_sync_logs テーブルを追加
            #   (CREATE TABLE IF NOT EXISTS + RLS、idempotent)
            #   2026-05-20 までは展開 runner が存在せず、全テナントで shifts 不在 →
            #   /api/v1/shifts が HTTP 500 ("relation \"shifts\" does not exist") を返す
            #   状態が継続していた。本ステップで遅延 catch-up する。
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_011_phase5_tenant_tables.py

            # Inventory Sprint 1 (migrations 056-063): マーケットプレイス型在庫基盤 (spec.md F1)
            #   - public schema migrations 056-062: 一括 1 回適用 (suppliers / supplier_aliases /
            #     knowledge_rules / discord_inbound_messages + idempotency / supplier_discord_routing /
            #     pokemon_dex / trainer_dex / tcg_series_master / products / inventory_movements /
            #     tenant_llm_budgets)
            #   - tenant_xxx migration 063: 全テナント schema に inventory.visibility.* permissions
            #     と purchase_orders.{company,contact_info}_snapshot 列を追加
            #   全 SQL は CREATE TABLE IF NOT EXISTS / ADD COLUMN IF NOT EXISTS /
            #   ON CONFLICT DO NOTHING で構成、idempotent。
            #   関連: .claude-pipeline/spec.md Sprint 1 / F1 / A6 マーケットプレイス型確定
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_inventory_sprint1.py

            # Inventory Sprint 2 (migrations 064-065): super-admin 権限二層構造 (spec.md F2)
            #   - migration 064: public.users に is_super_admin BOOLEAN NOT NULL DEFAULT FALSE 追加
            #   - migration 065: public.permissions に central.* キー 6件 seed
            #   全 SQL は ADD COLUMN IF NOT EXISTS / ON CONFLICT DO NOTHING で冪等。
            #   関連: .claude-pipeline/spec.md Sprint 2 / F2 / AC2.1 / PR #510
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_inventory_sprint2.py

            # Inventory Sprint 5/6/7 (migrations 066/067/068): catch-up hotfix (spec.md F5/F6/F7)
            #   PR #518 と同じパターン (deploy.yml 追記漏れ) の再発として、
            #   Sprint 5/6/7 の migration 実行ステップが本 deploy.yml から漏れていた。
            #   本番 DB に未適用だった 3 migration を 1 本のランナーで順序適用する。
            #     - migration 066 (Sprint 5/F5): public.tenant_llm_budgets.last_hard_stop_notified_at +
            #         tenant_004 / tenant_006 seed
            #     - migration 067 (Sprint 6/F6): public.discord_inbound_messages.version 列 +
            #         central.parse_review.{approve,reject} permissions seed
            #     - migration 068 (Sprint 7/F7): pg_trgm extension + 12 GIN indexes
            #         (検索 API p95 ≤ 500ms)
            #   全 SQL は ADD COLUMN IF NOT EXISTS / CREATE EXTENSION IF NOT EXISTS /
            #   ON CONFLICT DO NOTHING で冪等。論理順序維持のため Sprint 8 の前段に配置。
            #   関連: PR #518 / .claude-pipeline/spec.md F5 / F6 / F7
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_inventory_sprint5_to_7.py

            # Inventory Sprint 8 (migration 069): PO PDF / メール差出人テナント情報 (spec.md F8)
            #   - migration 069: {tenant_xxx}.tenant_profile 作成 + 既定行 seed
            #     + public.permissions に tenant.profile.view / edit を追加
            #     + 既存 オーナー / システム管理者ロールに権限割当
            #   全 SQL は CREATE TABLE IF NOT EXISTS / WHERE NOT EXISTS /
            #   ON CONFLICT (key) DO NOTHING で冪等。
            #   ADR-034: 新規テナントは backend/app/services/tenant.py の
            #   _TENANT_TABLES_SQL テンプレートで tenant_profile を持つ。
            #   関連: .claude-pipeline/spec.md Sprint 8 / F8 / AC8.7
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_inventory_sprint8.py

            # Inventory Sprint 9 (migration 070): Spreadsheet Phase 切替 (spec.md F9)
            #   PR #518 と同じパターン (deploy.yml 追記漏れ) の再発として、
            #   `scripts/migrate_inventory_sprint9.py` は存在したが deploy.yml への
            #   実行ステップが漏れていた。本番 DB に migration 070 が未適用のままで
            #   /super-admin/phase-switch が public.tenant_settings 不在で HTTP 500。
            #     - migration 070: public.tenant_settings テーブル新設 +
            #         既存テナント seed + public.permissions に phase.switch を追加
            #   全 SQL は CREATE TABLE IF NOT EXISTS / ON CONFLICT (key|tenant_id) DO NOTHING
            #   で冪等。論理順序維持のため Sprint 8 の後段に配置。
            #   関連: PR #518 / .claude-pipeline/spec.md F9
            docker exec -w /app astro-webapp-backend-1 \
              python scripts/migrate_inventory_sprint9.py

            # 新しいマイグレーションはここに追加してください（idempotent必須）
            # NOTE: 015-017 / 019-022 はテンプレート（{schema}プレースホルダ含む）のため
            #       deploy.yml では自動実行しない。新テナント作成は backend/app/services/tenant.py
            #       のテンプレートが全テーブルを作るので新テナントには追従不要。
            # ADR-034: 新規テナント作成時は scripts/setup_tenant.py を使うこと。
            #   同スクリプトが上記 migration を含む全 catch-up migration を新テナントに適用する。

            echo "Step 6: Health check..."
            docker exec astro-webapp-backend-1 python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" || (echo "Health check failed!" && exit 1)

            echo "Step 7: Checking container status..."
            docker compose ps

            echo "Step 8: Cleaning up old Docker images..."
            docker image prune -f

            echo "============================================"
            echo "Deployment completed successfully!"
            echo "============================================"

      - name: Verify deployment
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            curl -sf https://jarvis-claude.uk/api/health || echo "External health check warning"

            # ADR-045: migration 055 (granted_scopes) 適用検証
            #   全 active テナントスキーマで tenant_meta_config.granted_scopes 列が
            #   存在し、かつ NULL のレコードが残っていないことを確認する。
            #   missing/NULL が 1 件でもあれば RAISE EXCEPTION で本ステップを失敗させる。
            echo "Verifying ADR-045 migration 055 (granted_scopes)..."
            docker exec -i astro-webapp-postgres-1 \
              psql -U jarvis -d jarvis_db -v ON_ERROR_STOP=1 <<'VERIFY_EOF'
            DO $$
            DECLARE
                r RECORD;
                missing_col_count INT := 0;
                null_rows_total INT := 0;
                cnt INT;
            BEGIN
                FOR r IN
                    SELECT
                        id,
                        tenant_code,
                        format('tenant_%s', lpad(id::text, 3, '0')) AS schema
                    FROM public.tenants
                    WHERE is_active = true
                    ORDER BY id
                LOOP
                    IF NOT EXISTS (
                        SELECT 1 FROM information_schema.tables
                        WHERE table_schema = r.schema
                          AND table_name = 'tenant_meta_config'
                    ) THEN
                        CONTINUE;
                    END IF;

                    IF NOT EXISTS (
                        SELECT 1 FROM information_schema.columns
                        WHERE table_schema = r.schema
                          AND table_name = 'tenant_meta_config'
                          AND column_name = 'granted_scopes'
                    ) THEN
                        RAISE WARNING 'Missing granted_scopes column: schema=% tenant_code=%',
                            r.schema, r.tenant_code;
                        missing_col_count := missing_col_count + 1;
                        CONTINUE;
                    END IF;

                    EXECUTE format(
                        'SELECT COUNT(*) FROM %I.tenant_meta_config WHERE granted_scopes IS NULL',
                        r.schema
                    ) INTO cnt;
                    IF cnt > 0 THEN
                        RAISE WARNING 'NULL granted_scopes rows: schema=% tenant_code=% count=%',
                            r.schema, r.tenant_code, cnt;
                        null_rows_total := null_rows_total + cnt;
                    END IF;
                END LOOP;

                IF missing_col_count > 0 OR null_rows_total > 0 THEN
                    RAISE EXCEPTION
                        'ADR-045 verification failed: missing_col=% null_rows=%',
                        missing_col_count, null_rows_total;
                END IF;

                RAISE NOTICE 'ADR-045 verification OK';
            END
            $$;
            VERIFY_EOF

      - name: Deployment Failure Notification
        if: failure()
        run: |
          echo "Deployment failed!"
          echo "Please check the logs above for details."
          exit 1
