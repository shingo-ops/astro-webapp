name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "============================================"
            echo "Starting deployment..."
            echo "============================================"

            cd /home/ubuntu/astro-webapp

            echo "Step 1: Pulling latest code from GitHub..."
            git pull origin main

            echo "Step 2: Rebuilding and restarting containers..."
            docker compose up -d --build

            echo "Step 3: Restarting nginx to refresh DNS cache..."
            docker compose restart nginx

            echo "Step 4: Cleaning up old Docker images..."
            docker image prune -f

            echo "Step 5: Checking container status..."
            docker compose ps

            echo "============================================"
            echo "Deployment completed successfully!"
            echo "============================================"

      - name: Deployment Success Notification
        if: success()
        run: |
          echo "Deployment to VPS completed successfully!"
          echo "Application is now live at https://jarvis-claude.uk"

      - name: Deployment Failure Notification
        if: failure()
        run: |
          echo "Deployment failed!"
          echo "Please check the logs above for details."
          exit 1
