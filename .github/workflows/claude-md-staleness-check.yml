name: CLAUDE.md 定期見直しチェック（90日）

# 四半期ごとに CLAUDE.md ファイルの最終更新日を確認し、
# 90日以上更新されていないファイルがあれば GitHub Issue を自動作成する。
#
# 目的: ドキュメントが古くなったまま放置されるのを防ぐ。
# 参照: docs/adr/ADR-076-claude-md-hierarchy.md

on:
  schedule:
    # 毎年 1月・4月・7月・10月の1日 午前9時（JST = UTC 0時）に実行
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:
    # 手動実行も可能（GitHub Actions 画面から「Run workflow」）

jobs:
  staleness-check:
    name: CLAUDE.md 陳腐化チェック
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CLAUDE.md staleness (90 days)
        id: check
        run: |
          THRESHOLD_DAYS=90
          TODAY=$(date +%s)
          STALE_FILES=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            LAST_COMMIT=$(git log -1 --format="%ct" -- "$file" 2>/dev/null)
            [ -z "$LAST_COMMIT" ] && continue
            DAYS_OLD=$(( (TODAY - LAST_COMMIT) / 86400 ))
            LAST_DATE=$(git log -1 --format="%as" -- "$file")
            if [ "$DAYS_OLD" -gt "$THRESHOLD_DAYS" ]; then
              STALE_FILES="${STALE_FILES}\n- ${file}（最終更新: ${LAST_DATE}、${DAYS_OLD}日前）"
            fi
          done < <(find . -name "CLAUDE.md" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./frontend/node_modules/*")

          if [ -n "$STALE_FILES" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            printf '%b' "$STALE_FILES" > stale_files.txt
            echo "対象ファイル:"
            cat stale_files.txt
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "全 CLAUDE.md ファイルは ${THRESHOLD_DAYS}日以内に更新されています"
          fi

      - name: Create GitHub Issue
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MONTH=$(date +%-m)
          QUARTER=$(( (MONTH - 1) / 3 + 1 ))
          YEAR_Q="$(date +%Y)-Q${QUARTER}"
          STALE_LIST=$(cat stale_files.txt)

          {
            echo "以下の CLAUDE.md ファイルが90日以上更新されていません。内容が実態と合っているか確認してください。"
            echo ""
            echo "${STALE_LIST}"
            echo ""
            echo "チェック項目:"
            echo "- 古くなったルールを削除または更新する"
            echo "- 実態と乖離しているルールを修正する（手順・ツール名・ファイル名の変更など）"
            echo "- 不要になったセクションを削除する"
            echo "- 新しい知見があれば追記する"
            echo ""
            echo "完了したらこのIssueをCloseしてください。次の四半期チェックは自動で実行されます。"
          } > issue_body.txt

          gh issue create \
            --title "CLAUDE.md 定期見直し ${YEAR_Q}（90日以上未更新あり）" \
            --body-file issue_body.txt
