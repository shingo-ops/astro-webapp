name: CI設定整合性チェック

# CI最適化（PR #801）とポカよけ設定（migration-guard, e2e）が
# 意図せず変更されていないことを検証する。
#
# [重要] このファイルは変更禁止（CLAUDE.md §不可逆操作 参照）。
# PO（しんごさん）確認なしに paths: の追加・削除・ロジック変更をしないこと。
# Required Status Check として設定されているため、
# このチェックが失敗すると Claude Code を含む全ての PR がマージ不可になる。

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: CI設定整合性チェック
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: workflow-lint.yml 自身の改ざん検知
        run: |
          # 対策B: --diff-filter=M を削除 → 追加(A)・削除(D)・変更(M) すべてを検知
          # 対策C: push/PR 両方で実行。push 時は HEAD~1 と比較
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only ${BASE}...HEAD -- .github/workflows/workflow-lint.yml)
          if [ -n "$CHANGED" ]; then
            echo "::error::workflow-lint.yml の変更は PO 確認必須操作です（CLAUDE.md §不可逆操作 参照）"
            exit 1
          fi

      - name: ポカよけCI・最適化CI の設定を検証
        run: |
          python3 - << 'EOF'
          import yaml, sys

          # 対策E: deploy.yml / claude-pipeline.yml を追加
          checks = [
              {
                  "file": ".github/workflows/check-claude-size.yml",
                  "rule": "has_claude_md_in_paths",
                  "reason": "ADR-076 CLAUDE.md サイズ管理: paths に CLAUDE.md パターンが必須。削除するとサイズチェックが走らなくなる",
              },
              {
                  "file": ".github/workflows/migration-guard.yml",
                  "rule": "no_paths",
                  "reason": "ADR-036 DBポカよけ: 常時実行必須。paths追加で検出漏れが発生する",
              },
              {
                  "file": ".github/workflows/e2e.yml",
                  "rule": "no_paths",
                  "reason": "Issue #523 学習済み。paths追加でデッドロックが発生する",
              },
              {
                  "file": ".github/workflows/test.yml",
                  "rule": "has_backend_in_paths",
                  "reason": "PR #801 CI最適化: backend/**がpathsに必須。削除するとバックエンドCIが常時スキップされる",
              },
              {
                  "file": ".github/workflows/deploy.yml",
                  "rule": "no_pull_request",
                  "reason": "本番デプロイ: pull_request トリガー追加で意図しない自動デプロイが発生する",
              },
              {
                  "file": ".github/workflows/claude-pipeline.yml",
                  "rule": "no_paths",
                  "reason": "ADR自動起動CI: paths追加でADR実装ループが停止する",
              },
              {
                  "file": ".github/workflows/dockerfile-lint.yml",
                  "rule": "has_pull_request_blocking",
                  "reason": "PR #918 hadolint追加: pull_requestトリガー削除・continue-on-error追加でDockerfileチェックが無効化される",
              },
              {
                  "file": ".github/workflows/requirements-lint.yml",
                  "rule": "has_pull_request_blocking",
                  "reason": "PR #934 requirements分離: pull_requestトリガー削除・continue-on-error追加でテストパッケージ混入チェックが無効化される",
              },
              {
                  "file": ".github/workflows/lint-tenant-schema.yml",
                  "rule": "has_pull_request_blocking",
                  "reason": "ADR-072 テナントスキーマlint: pull_requestトリガー削除・continue-on-error追加でテナント分離チェックが無効化される",
              },
          ]

          errors = []
          for check in checks:
              with open(check["file"]) as f:
                  data = yaml.safe_load(f)

              # PyYAML は `on:` を True (bool) として解析するため両方を試みる
              on_section = data.get(True, data.get("on", {}))
              pr_section = on_section.get("pull_request", {})
              paths = pr_section.get("paths", None) if isinstance(pr_section, dict) else None

              if check["rule"] == "has_claude_md_in_paths":
                  if paths is None or not any("CLAUDE.md" in p for p in paths):
                      errors.append(
                          f"❌ {check['file']}: paths に CLAUDE.md パターンが含まれていません\n"
                          f"   現在の paths: {paths}\n"
                          f"   理由: {check['reason']}"
                      )
              elif check["rule"] == "no_paths" and paths is not None:
                  errors.append(
                      f"❌ {check['file']}: paths: filter が追加されています\n"
                      f"   理由: {check['reason']}"
                  )
              elif check["rule"] == "has_backend_in_paths":
                  if paths is not None and "backend/**" in paths:
                      pass  # 従来方式（PR #801）: pull_request.paths に backend/** 指定
                  elif paths is None:
                      # detect-changes 方式: paths 削除 + detect-changes ジョブで条件付き実行
                      # （PO 承認済み: フロントのみ PR でも必須チェックを通過させるため）
                      with open(check["file"]) as f2:
                          d2 = yaml.safe_load(f2)
                      jobs2 = d2.get("jobs", {})
                      if "detect-changes" not in jobs2:
                          errors.append(
                              f"❌ {check['file']}: paths が削除されていますが "
                              f"detect-changes ジョブが存在しません\n"
                              f"   理由: {check['reason']}"
                          )
                  else:
                      errors.append(
                          f"❌ {check['file']}: paths に backend/** が含まれていません\n"
                          f"   現在の paths: {paths}\n"
                          f"   理由: {check['reason']}"
                      )
              elif check["rule"] == "no_pull_request":
                  pr_trigger = on_section.get("pull_request", None)
                  if pr_trigger is not None:
                      errors.append(
                          f"❌ {check['file']}: pull_request トリガーが追加されています\n"
                          f"   理由: {check['reason']}"
                      )
              elif check["rule"] == "has_pull_request_blocking":
                  pr_trigger = on_section.get("pull_request", None)
                  if pr_trigger is None:
                      errors.append(
                          f"❌ {check['file']}: pull_request トリガーが削除されています\n"
                          f"   理由: {check['reason']}"
                      )
                  else:
                      # continue-on-error: true が全ステップにないことを確認
                      jobs_section = data.get("jobs", {})
                      skippable = []
                      for job_name, job_data in jobs_section.items():
                          if not isinstance(job_data, dict):
                              continue
                          for step in job_data.get("steps", []):
                              if step.get("continue-on-error") is True:
                                  skippable.append(f"{job_name}/{step.get('name', '(無名)')}")
                      if skippable:
                          errors.append(
                              f"❌ {check['file']}: 以下のステップに continue-on-error: true があります（非ブロッキング化）\n"
                              f"   対象: {skippable}\n"
                              f"   理由: {check['reason']}"
                          )

          if errors:
              print("=" * 60)
              print("CI設定整合性チェック FAILED")
              print("=" * 60)
              for e in errors:
                  print(e)
              print()
              print("修正するには docs/adr/ の該当ADRを確認し PO に承認を得ること。")
              sys.exit(1)

          print("✅ CI設定整合性チェック: 全て正常")
          EOF
