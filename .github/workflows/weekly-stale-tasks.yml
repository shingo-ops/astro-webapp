name: weekly stale tasks check

on:
  schedule:
    - cron: '0 2 * * 1'  # 毎週月曜 11:00 JST
  workflow_dispatch:

jobs:
  stale-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Detect stale active tasks (更新日 7日以上前)
        env:
          DISCORD_WEBHOOK_OWNER_PING: ${{ secrets.DISCORD_WEBHOOK_SCHEDULED_REPORT }}
        run: |
          STALE=$(python3 - <<'PYEOF'
import sys
from datetime import datetime, timezone, timedelta

TODO = "tasks/todo.md"
THRESHOLD_DAYS = 7

try:
    with open(TODO, encoding="utf-8") as f:
        lines = f.readlines()
except FileNotFoundError:
    print("SKIP: tasks/todo.md not found")
    sys.exit(0)

# 進行中セクションの行を抽出
in_section = False
rows = []
for line in lines:
    if line.startswith("## 進行中"):
        in_section = True
        continue
    if in_section and line.startswith("## "):
        break
    if in_section and line.startswith("|") and "---" not in line:
        rows.append(line.strip())

# ヘッダー行をスキップ
data_rows = [r for r in rows if not r.startswith("| タスク")]

today = datetime.now(timezone.utc)
stale = []

for row in data_rows:
    cols = [c.strip() for c in row.split("|") if c.strip()]
    if len(cols) < 6:
        continue
    task_name = cols[0]
    owner = cols[1]
    date_str = cols[5]  # 更新日（6列目）
    try:
        updated = datetime.strptime(date_str, "%Y-%m-%d").replace(tzinfo=timezone.utc)
        diff = (today - updated).days
        if diff >= THRESHOLD_DAYS:
            stale.append(f"- **{task_name}** （担当: {owner}）— {diff}日更新なし（最終: {date_str}）")
    except ValueError:
        continue

for s in stale:
    print(s)
PYEOF
)

          if [ -z "$STALE" ]; then
            echo "✅ 全タスク 7日以内に更新済み"
            exit 0
          fi

          COUNT=$(echo "$STALE" | grep -c "^-" || true)
          echo "⏰ 放置タスク ${COUNT} 件検出"

          MSG="⏰ **tasks/todo.md に ${COUNT} 件の未更新タスクがあります（7日以上更新なし）**

${STALE}

タスクが完了していれば「完了（直近）」に移動し、進行中であれば「現在地・次の一手・更新日」を更新してください。
→ \`tasks/todo.md\` を確認: https://github.com/shingo-ops/salesanchor/blob/develop/tasks/todo.md"

          bash scripts/notify/discord-owner-ping.sh "$MSG"
