name: weekly stale tasks check

on:
  schedule:
    - cron: '0 2 * * 1'  # 毎週月曜 11:00 JST
  workflow_dispatch:

jobs:
  stale-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Detect stale active tasks (更新日 7日以上前)
        env:
          DISCORD_WEBHOOK_OWNER_PING: ${{ secrets.DISCORD_WEBHOOK_SCHEDULED_REPORT }}
        run: |
          STALE=$(python3 scripts/check-stale-tasks.py)

          if [ -z "$STALE" ]; then
            echo "✅ 全タスク 7日以内に更新済み"
            exit 0
          fi

          COUNT=$(echo "$STALE" | grep -c "^-" || true)
          echo "⏰ 放置タスク ${COUNT} 件検出"

          {
            echo "⏰ **tasks/todo.md に ${COUNT} 件の未更新タスクがあります（7日以上更新なし）**"
            echo ""
            echo "${STALE}"
            echo ""
            echo "タスクが完了していれば「完了（直近）」に移動し、進行中であれば「現在地・次の一手・更新日」を更新してください。"
            echo "→ \`tasks/todo.md\` を確認: https://github.com/shingo-ops/salesanchor/blob/develop/tasks/todo.md"
          } > /tmp/discord_msg.txt

          bash scripts/notify/discord-owner-ping.sh "$(cat /tmp/discord_msg.txt)"
