name: CLAUDE.md Size Guard (bypass)

# CLAUDE.md が変更されていない PR では required check が "未実行" でブロックされるため、
# paths-ignore で逆条件をカバーし、スキップ扱いで PASS を報告する。
# check-claude-size.yml (paths: **/CLAUDE.md) とペアで機能する。

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/CLAUDE.md'

jobs:
  check:
    name: CLAUDE.md line count check
    runs-on: ubuntu-latest
    steps:
      - name: CLAUDE.md に変更なし — サイズチェックをスキップ
        run: echo "✅ CLAUDE.md は変更されていません。サイズチェックをスキップします。"
