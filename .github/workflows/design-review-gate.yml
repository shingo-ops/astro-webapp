name: Design Review Gate

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, reopened, edited, synchronize, ready_for_review]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]

concurrency:
  group: design-review-gate-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  design-review-gate:
    name: design-review-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request_review'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve PR number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch PR review evidence
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json number,title,headRefOid,body,comments,reviews \
            > /tmp/pr-design-review.json

      - name: Require current-head design review
        env:
          DESIGN_REVIEW_TRUSTED_ACTORS: shingo-ops,Hikky-dev
        run: python3 scripts/check-design-review.py /tmp/pr-design-review.json
