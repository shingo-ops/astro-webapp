name: Diag - Tenant schemas and companies tables

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check all tenant schemas
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            docker exec astro-webapp-postgres-1 psql -U jarvis -d jarvis_db -c "
              SELECT id, tenant_code, is_active FROM public.tenants ORDER BY id;
            "
            echo "=== tenant schemas ==="
            docker exec astro-webapp-postgres-1 psql -U jarvis -d jarvis_db -c "
              SELECT nspname FROM pg_namespace WHERE nspname LIKE 'tenant_%' ORDER BY nspname;
            "
            echo "=== backend container can resolve tenant_001.company_addresses? ==="
            docker exec astro-webapp-backend-1 python -c "
import asyncio, os
from sqlalchemy.ext.asyncio import create_async_engine
from sqlalchemy import text
async def main():
    eng = create_async_engine(os.environ['DATABASE_URL'])
    async with eng.connect() as conn:
        await conn.execute(text('SET search_path = tenant_001, public'))
        r = await conn.execute(text('SELECT current_schemas(true) AS s'))
        print('current_schemas:', r.scalar())
        r2 = await conn.execute(text(\"SELECT COUNT(*) FROM pg_tables WHERE schemaname IN ('tenant_001','public') AND tablename = 'company_addresses'\"))
        print('company_addresses count:', r2.scalar())
        try:
            r3 = await conn.execute(text('DELETE FROM company_addresses WHERE FALSE'))
            print('DELETE probe: OK', r3.rowcount)
        except Exception as e:
            print('DELETE probe FAIL:', type(e).__name__, str(e)[:200])
    await eng.dispose()
asyncio.run(main())
" 2>&1
            echo "=== test-admin user mapping ==="
            docker exec astro-webapp-postgres-1 psql -U jarvis -d jarvis_db -c "
              SELECT id, email, tenant_id, is_active FROM public.users WHERE email LIKE '%jarvis-test%' OR email LIKE '%admin%' ORDER BY id;
            "
            echo "=== companies + company_addresses per tenant ==="
            for schema in $(docker exec astro-webapp-postgres-1 psql -U jarvis -d jarvis_db -tAc "SELECT nspname FROM pg_namespace WHERE nspname LIKE 'tenant_%'"); do
              echo "--- $schema ---"
              docker exec astro-webapp-postgres-1 psql -U jarvis -d jarvis_db -c "
                SELECT tablename FROM pg_tables
                WHERE schemaname = '$schema' AND tablename IN (
                  'companies', 'contacts', 'company_addresses', 'company_sales_channels',
                  'contact_emails', 'contact_discord', 'contact_contact_channels',
                  '_customer_migration_map', 'leads', 'staff'
                )
                ORDER BY tablename;
              "
            done
