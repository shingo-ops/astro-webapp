name: Claude Max Auto-Pipeline (Partner Subscription)

on:
  push:
    paths:
      - 'ADR-*.md'
      - 'docs/adr/ADR-*.md'

permissions:
  contents: write

jobs:
  claude-worker:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify Discord (Start)
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{"content": "🚀 **ADRの更新を検知**\nパートナーのMaxプラン権限でClaudeが解析を開始します..."}' \
            ${{ secrets.DISCORD_WEBHOOK_PLAN_REVIEW }}

      - name: Run Claude Code
        env:
          PATH: /Users/hitoshi/.local/bin:/Users/hitoshi/.nvm/versions/node/v24.2.0/bin:/usr/local/bin:/usr/bin:/bin
        run: |
          set -e
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep -E '(^|/)ADR-.*\.md$' | tr '\n' ' ')
          if [ -z "$CHANGED_FILES" ]; then
            echo "No ADR files changed."
            exit 0
          fi
          echo "Reviewing ADRs: $CHANGED_FILES"
          claude -p --permission-mode bypassPermissions \
            "新しく更新された ${CHANGED_FILES} を読み取り、内容のレビューと実装を行ってください。成果は feedback.md に追記してください。"

      - name: Commit and Push
        run: |
          git config user.email "action@github.com"
          git config user.name "Claude-Max-Worker"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-review for ADR by Claude Max"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Notify Discord (Success)
        if: success()
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{"content": "✅ **Claude Maxの作業が完了しました！**\nリポジトリを確認してください。"}' \
            ${{ secrets.DISCORD_WEBHOOK_PLAN_REVIEW }}

      - name: Notify Discord (Failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{"content": "❌ **Claude Maxの作業が失敗しました。**\nGitHub Actions のログを確認してください。"}' \
            ${{ secrets.DISCORD_WEBHOOK_PLAN_REVIEW }}
