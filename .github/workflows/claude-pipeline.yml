name: Claude Max Auto-Pipeline (Partner Subscription)

on:
  push:
    paths:
      - 'ADR-*.md'
      - 'docs/adr/ADR-*.md'

jobs:
  claude-worker:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify Discord (Start)
        run: |
          curl -H "Content-Type: application/json" -X POST \
          -d '{"content": "🚀 **ADRの更新を検知**\nパートナーのMaxプラン権限でClaudeが解析を開始します..."}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Run Claude Code
        run: |
          # 変更されたADRファイルを特定
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep 'ADR-' | tr '\n' ' ')
          
          if [ -n "$CHANGED_FILES" ]; then
            # HitoshiさんのMacでログイン済みのMaxアカウントを使用して実行
            claude -y "新しく更新された ${CHANGED_FILES} を読み取り、内容のレビューと実装を行ってください。成果は feedback.md に追記して。"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Claude-Max-Worker"
          git add .
          git commit -m "Auto-review for ADR by Claude Max" || echo "No changes"
          git push

      - name: Notify Discord (Success)
        run: |
          curl -H "Content-Type: application/json" -X POST \
          -d '{"content": "✅ **Claude Maxの作業が完了しました！**\nリポジトリを確認してください。"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
