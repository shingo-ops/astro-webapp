# ============================================================
# Phase 5: api.salesanchor.jp - API 専用サブドメイン
# Meta Webhook (Phase 5 で C3 切替) / Data Deletion Callback (B 実装後) で使用
# フロントエンド・管理画面は提供しない（API only）
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.salesanchor.jp;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.salesanchor.jp;

    ssl_certificate     /etc/letsencrypt/live/api.salesanchor.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.salesanchor.jp/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # API ドメインは JSON 返却前提だが、502/504 等の nginx error page が HTML で
    # 返る defense-in-depth として CSP を最小権限で固定
