# ============================================================
# Phase 5: api.salesanchor.jp - API 専用サブドメイン
# Meta Webhook (Phase 5 で C3 切替) / Data Deletion Callback (B 実装後) で使用
# フロントエンド・管理画面は提供しない（API only）
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.salesanchor.jp;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.salesanchor.jp;

    ssl_certificate     /etc/letsencrypt/live/api.salesanchor.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.salesanchor.jp/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # API ドメインなのでフレームは全拒否、CSP も最小（API レスポンスは JSON）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location /api/v1/auth/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/ {
        limit_req zone=api burst=50;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # API 以外は 404
    location / {
        return 404;
    }
}

# ============================================================
# salesanchor.jp - 独立した静的サイトホスティング
# Production-only: ssl_certificate と www/salesanchor 配下のコンテンツは
# VPS でのみ用意される。dev 環境でこの server ブロックを起動するには
# Let's Encrypt 証明書 mock + コンテンツの配置が必要（別途対応）。
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name salesanchor.jp www.salesanchor.jp;

    # Let's Encrypt 更新用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # その他は HTTPS へリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name salesanchor.jp www.salesanchor.jp;

    ssl_certificate     /etc/letsencrypt/live/salesanchor.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/salesanchor.jp/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/salesanchor;
    index index.html;

    # クリーンURL対応（Meta API 申請等で必須のページ）
    location /privacy {
        try_files $uri $uri/ /privacy/index.html;
    }

    location /terms {
        try_files $uri $uri/ /terms/index.html;
    }

    location /data-deletion {
        try_files $uri $uri/ /data-deletion/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # セキュリティヘッダー
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
