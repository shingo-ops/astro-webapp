# ============================================================
# monitor.salesanchor.jp - Uptime Kuma 専用監視ダッシュボード
# ADR-069 参照。VPS で初回起動前に certbot での証明書取得が必要:
#   certbot certonly --webroot -w /var/www/certbot -d monitor.salesanchor.jp
# さくらインターネット DNS: monitor.salesanchor.jp A レコード → VPS IP（49.212.137.46）を追加すること
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name monitor.salesanchor.jp;

    # Let's Encrypt 証明書検証用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name monitor.salesanchor.jp;

    ssl_certificate     /etc/letsencrypt/live/monitor.salesanchor.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.salesanchor.jp/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Uptime Kuma へのリバースプロキシ（WebSocket 必須）
    location / {
        proxy_pass http://uptime-kuma:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
}

# ============================================================
# salesanchor.jp - 独立した静的サイトホスティング
# Production-only: ssl_certificate と www/salesanchor 配下のコンテンツは
# VPS でのみ用意される。dev 環境でこの server ブロックを起動するには
# Let's Encrypt 証明書 mock + コンテンツの配置が必要（別途対応）。
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name salesanchor.jp www.salesanchor.jp;

    # Let's Encrypt 更新用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # その他は HTTPS へリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name salesanchor.jp www.salesanchor.jp;

    ssl_certificate     /etc/letsencrypt/live/salesanchor.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/salesanchor.jp/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/salesanchor;
    index index.html;

    # クリーンURL対応（Meta API 申請等で必須のページ）
    location /privacy {
        try_files $uri $uri/ /privacy/index.html;
    }

    location /terms {
        try_files $uri $uri/ /terms/index.html;
    }

    location /data-deletion {
        try_files $uri $uri/ /data-deletion/index.html;
    }

    location / {
        # Phase 1-E M-DYN-2 (2026-05-02): 存在しないパスは soft 404 (LP HTML 200) ではなく
        # 専用 404 ページを返す。Astro がビルドする /404.html を error_page で返却。
        try_files $uri $uri/ =404;
    }

    # 404 専用ページ（Astro lp/src/pages/404.astro でビルド）
    error_page 404 /404.html;

    # セキュリティヘッダー
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
