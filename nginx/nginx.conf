# Nginxバージョン情報を隠蔽（攻撃者にヒントを与えない）
server_tokens off;

# レート制限ゾーン定義
# ログインAPI: 1分間に10リクエストまで（ブルートフォース攻撃防止）
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
# 一般API: 1秒間に30リクエストまで（API乱用防止）
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# HTTP設定 - HTTPSへリダイレクト
server {
    listen 80;
    server_name jarvis-claude.uk;

    # Let's Encrypt証明書検証用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # その他のリクエストはHTTPSにリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS設定
server {
    listen 443 ssl;
    server_name jarvis-claude.uk;

    # SSL証明書設定
    ssl_certificate /etc/letsencrypt/live/jarvis-claude.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jarvis-claude.uk/privkey.pem;

    # SSL設定の最適化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # セキュリティヘッダー
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # リクエストボディサイズ制限（大容量アップロード攻撃防止）
    client_max_body_size 10m;

    # ログインAPI（厳しいレート制限）
    location /api/v1/auth/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
    }

    # Phase 2 SSE: conversations/stream 専用（/api/ より先に評価される完全一致）
    location = /api/v1/conversations/stream {
        proxy_pass http://backend:8000/api/v1/conversations/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # SSE 必須: バッファリング無効 + 長時間タイムアウト
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        3600s;
        proxy_send_timeout        3600s;
        proxy_connect_timeout     10s;
        proxy_http_version        1.1;
        chunked_transfer_encoding on;
        # limit_req は SSE 長時間接続には不適切（バックエンド側で接続数制限）
    }

    # Phase 3 SSE: leads/stream 専用（/api/ より先に評価される完全一致）
    location = /api/v1/leads/stream {
        proxy_pass http://backend:8000/api/v1/leads/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # SSE 必須: バッファリング無効 + 長時間タイムアウト
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        3600s;
        proxy_send_timeout        3600s;
        proxy_connect_timeout     10s;
        proxy_http_version        1.1;
        chunked_transfer_encoding on;
        # limit_req は SSE 長時間接続には不適切（バックエンド側で接続数制限）
    }

    # バックエンドAPI（一般レート制限）
    location /api/ {
        limit_req zone=api burst=50;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
    }

    # Grafanaダッシュボード（管理者用）
    location /grafana/ {
        proxy_pass http://grafana:3000/grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # GrafanaはReact/Angularバンドルに'unsafe-eval'が必要（グローバルCSPを上書き）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; connect-src 'self' ws: wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:;" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # Uptime Kuma死活監視（管理者用・ローカルネットワークのみ）
    location /status/ {
        # 本番では許可IPを適切に設定すること
        # allow 49.212.137.46;  # VPS自身
        # deny all;
        proxy_pass http://uptime-kuma:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # フロントエンド（React）
    location / {
        proxy_pass http://frontend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nginx Exporter用（内部アクセスのみ）
    location /nginx_status {
        stub_status;
        allow 172.16.0.0/12;  # Dockerネットワーク内のみ許可
        deny all;
    }
}

