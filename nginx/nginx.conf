# Nginxバージョン情報を隠蔽（攻撃者にヒントを与えない）
server_tokens off;

# ============================================================
# Cloudflare リアルIP復元設定
# 参照: https://www.cloudflare.com/ips/
# ============================================================
# -- IPv4 --
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# -- IPv6 --
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# レート制限ゾーン定義
# ログインAPI: 1分間に10リクエストまで（ブルートフォース攻撃防止）
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
# 一般API: 1秒間に30リクエストまで（API乱用防止）
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# HTTP設定 - HTTPSへリダイレクト
server {
    listen 80;
    server_name jarvis-claude.uk;

    # Let's Encrypt証明書検証用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # その他のリクエストはHTTPSにリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS設定
server {
    listen 443 ssl;
    server_name jarvis-claude.uk;

    # SSL証明書設定
    ssl_certificate /etc/letsencrypt/live/jarvis-claude.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jarvis-claude.uk/privkey.pem;

    # SSL設定の最適化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # セキュリティヘッダー
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # リクエストボディサイズ制限（大容量アップロード攻撃防止）
    client_max_body_size 10m;

    # ログインAPI（厳しいレート制限）
    location /api/v1/auth/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # バックエンドAPI（一般レート制限）
    location /api/ {
        limit_req zone=api burst=50;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Grafanaダッシュボード（管理者用）
    location /grafana/ {
        proxy_pass http://grafana:3000/grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uptime Kuma死活監視（管理者用・ローカルネットワークのみ）
    location /status/ {
        # 本番では許可IPを適切に設定すること
        # allow 49.212.137.46;  # VPS自身
        # deny all;
        proxy_pass http://uptime-kuma:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # フロントエンド（React）
    location / {
        proxy_pass http://frontend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nginx Exporter用（内部アクセスのみ）
    location /nginx_status {
        stub_status;
        allow 172.16.0.0/12;  # Dockerネットワーク内のみ許可
        deny all;
    }
}

