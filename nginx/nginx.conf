# Nginxバージョン情報を隠蔽（攻撃者にヒントを与えない）
server_tokens off;

# レート制限ゾーン定義
# ログインAPI: 1分間に10リクエストまで（ブルートフォース攻撃防止）
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
# 一般API: 1秒間に30リクエストまで（API乱用防止）
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# HTTP設定 - HTTPSへリダイレクト
server {
    listen 80;
    server_name jarvis-claude.uk;

    # Let's Encrypt証明書検証用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # その他のリクエストはHTTPSにリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS設定
server {
    listen 443 ssl;
    server_name jarvis-claude.uk;

    # SSL証明書設定
    ssl_certificate /etc/letsencrypt/live/jarvis-claude.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jarvis-claude.uk/privkey.pem;

    # SSL設定の最適化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # セキュリティヘッダー
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ログインAPI（厳しいレート制限）
    location /api/v1/auth/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # バックエンドAPI（一般レート制限）
    location /api/ {
        limit_req zone=api burst=50;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # フロントエンド（React）
    location / {
        proxy_pass http://frontend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
