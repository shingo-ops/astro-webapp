version: '3.8'

services:
  # Nginxリバースプロキシ
  nginx:
    image: nginx:1.31.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      # salesanchor.jp 静的サイト（Production-only、コンテンツは VPS-local 管理）
      - ./www/salesanchor:/var/www/salesanchor:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/nginx_status"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - frontnet

  # Certbot（SSL証明書取得・更新）
  certbot:
    image: certbot/certbot:v5.6.0
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - frontnet

  # バックエンドAPI（FastAPI）
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://jarvis-claude.uk}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - MFA_REQUIRED=${MFA_REQUIRED:-true}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - METADATA_FERNET_KEY=${METADATA_FERNET_KEY:-}
      # Phase 1-D Sprint 2: OAuth 接続 (Facebook Login)
      - META_APP_ID=${META_APP_ID:-}
      - META_OAUTH_REDIRECT_URI=${META_OAUTH_REDIRECT_URI:-}
      - META_GRAPH_API_VERSION=${META_GRAPH_API_VERSION:-v19.0}
      # Phase 2 Webhook 後方互換 fallback: webhook.py の _get_tenant_id_by_page で
      # tenant_meta_config 検索失敗時に env と一致した page_id を fallback で
      # 最初の active tenant に紐付ける。OAuth 接続完了後 (tenant_meta_config に
      # データ投入後) は不要だが、過渡期に必要 (spec §5-7 / Sprint 6 設計)。
      - META_PAGE_ID=${META_PAGE_ID:-}
      - META_PAGE_ACCESS_TOKEN=${META_PAGE_ACCESS_TOKEN:-}
      - ENFORCE_METADATA_FERNET_KEY=${ENFORCE_METADATA_FERNET_KEY:-}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-}
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M
    networks:
      - frontnet
      - backnet

  # フロントエンド（React + TypeScript + Vite）
  frontend:
    build:
      context: ./frontend
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_GCP_PROJECT_ID: ${VITE_GCP_PROJECT_ID}
    restart: unless-stopped
    healthcheck:
      # localhost が IPv6 (::1) に解決され nginx の IPv4-only listen と
      # ミスマッチするケースで unhealthy になる問題を回避するため
      # 127.0.0.1 を明示し、wget で実応答も併せて確認する。
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16M
    networks:
      - frontnet

  # Celeryワーカー（非同期タスク実行）
  celery-worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M
    networks:
      - backnet

  # Celery Beat（定期タスクスケジューラー）
  celery-beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16M
    networks:
      - backnet

  # ============================================================
  # Discord Gateway Worker (ADR-009 M2: Skeleton)
  # ============================================================
  # WebSocket 常駐プロセス。per-tenant Bot Token を環境変数経由で受け取り
  # READY/heartbeat ログのみ出力する skeleton 段階。
  # M3 で MESSAGE_CREATE → raw_webhook_events ingestion を追加予定。
  discord-gateway:
    build: ./backend
    command: python -m app.discord_gateway.main
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DISCORD_GATEWAY_LOG_LEVEL=${DISCORD_GATEWAY_LOG_LEVEL:-INFO}
      # per-tenant Bot Token（ADR-009 5-3）
      # 形式: DISCORD_BOT_TOKEN_<TENANT_ID>=<token>
      # tenant_004 = HIGH LIFE JPN
      - DISCORD_BOT_TOKEN_4=${DISCORD_BOT_TOKEN_4:-}
      - DISCORD_TENANT_CODE_4=${DISCORD_TENANT_CODE_4:-highlife-jpn}
    # M2 では Redis に触らないため depends_on は不要。M4 で Redis Pub/Sub
    # 利用開始時に condition: service_healthy で復活させる。
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16M
    networks:
      - backnet

  # Redisキャッシュ
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16M
    networks:
      - backnet

  # PostgreSQLデータベース
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

  # ============================================================
  # 監視・運用基盤（ステージ3）
  # ============================================================

  # --- B-1: Prometheus（メトリクス収集） ---
  prometheus:
    image: prom/prometheus:v3.11.3
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - /home/ubuntu/salesanchor/monitoring/prometheus/secrets:/etc/prometheus/secrets:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

  # Grafana（可視化・アラート・ダッシュボード）
  grafana:
    image: grafana/grafana:13.0.1
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=https://app.salesanchor.jp/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - GF_DATE_FORMATS_USE_BROWSER_LOCALE=true
      - GF_DATE_FORMATS_FULL_DATE=YYYY/MM/DD HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_DAY=MM/DD
      - GF_DATE_FORMATS_INTERVAL_MONTH=YYYY/MM
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
      - GF_USERS_DEFAULT_LANGUAGE=ja-JP
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet
      - frontnet

  # Node Exporter（ホストOS: CPU/メモリ/ディスク）
  node-exporter:
    image: prom/node-exporter:v1.11.1
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

  # PostgreSQL Exporter（DB接続数・クエリ統計）
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

  # Nginx Exporter（リクエスト数・ステータスコード）
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    command:
      - "-nginx.scrape-uri=http://nginx:80/nginx_status"
    depends_on:
      - nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    networks:
      - frontnet
      - backnet

  # cAdvisor（コンテナ別 CPU・メモリ・ネットワーク）ADR-079
  # v0.47.2 + cgroup: host: VPS cgroup 名前空間共有。これがないと Docker コンテナ cgroup が見えない。
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    privileged: true
    cgroup: host
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - --docker_only=true
      - --housekeeping_interval=30s
      - --disable_metrics=tcp,udp,disk,diskIO,process,hugetlb,referenced_memory
      - --store_container_labels=false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - backnet

  # Redis Exporter（Redisキャッシュメトリクス）ADR-079
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

  # GitHub Actions Exporter（CI実行メトリクス）ADR-077
  # ジョブ/ステップ単位の実行時間・成否を Prometheus に送信する。
  # 秘密鍵は GHA_APP_KEY_PATH のファイルをマウントして使用（.env には書かない）。
  gha-exporter:
    build:
      context: ./monitoring/gha-exporter
      args:
        GHA_EXPORTER_VERSION: "v0.0.15"
    environment:
      - GHA_APP_ID=${GHA_APP_ID}
      - GHA_APP_KEY_FILE=/run/secrets/gha-key
      - GHA_OWNER=shingo-ops
    command:
      - "--repos=salesanchor"
      - "--sleep=60s"
      - "--backfill"
    volumes:
      - ${GHA_APP_KEY_PATH}:/run/secrets/gha-key:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

  # --- B-2: Loki（ログ集積 + 異常検知） ---
  loki:
    image: grafana/loki:3.7.2
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - loki_data:/loki
      - ./monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ./monitoring/loki/rules:/loki/rules:ro
    restart: unless-stopped
    healthcheck:
      # grafana/loki:3.7.2 は distroless イメージのため wget/sh が存在せず CMD-SHELL 不可。
      # Prometheus による /metrics スクレイプで死活監視を代替。
      disable: true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

  # Promtail（ログ収集 → Lokiに送信）
  promtail:
    image: grafana/promtail:3.6.11
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    healthcheck:
      # grafana/promtail:3.6.11 は distroless イメージのため wget/sh が存在せず CMD-SHELL 不可。
      # Prometheus による /metrics スクレイプで死活監視を代替。
      disable: true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

  # --- B-3: Uptime Kuma（死活監視） ---
  uptime-kuma:
    image: louislam/uptime-kuma:2.3.0
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - frontnet
      - backnet

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  uptime_kuma_data:

networks:
  frontnet:
  backnet:
