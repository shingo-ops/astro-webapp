version: '3.8'

services:
  # Nginxリバースプロキシ
  nginx:
    image: nginx:1.31.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      # salesanchor.jp 静的サイト（Production-only、コンテンツは VPS-local 管理）
      - ./www/salesanchor:/var/www/salesanchor:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/nginx_status"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - frontnet

  # Certbot（SSL証明書取得・更新）
  certbot:
    image: certbot/certbot:v5.6.0
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - frontnet

  # バックエンドAPI（FastAPI）
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://jarvis-claude.uk}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - MFA_REQUIRED=${MFA_REQUIRED:-true}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - METADATA_FERNET_KEY=${METADATA_FERNET_KEY:-}
      # Phase 1-D Sprint 2: OAuth 接続 (Facebook Login)
      - META_APP_ID=${META_APP_ID:-}
      - META_OAUTH_REDIRECT_URI=${META_OAUTH_REDIRECT_URI:-}
      - META_GRAPH_API_VERSION=${META_GRAPH_API_VERSION:-v19.0}
      # Phase 2 Webhook 後方互換 fallback: webhook.py の _get_tenant_id_by_page で
      # tenant_meta_config 検索失敗時に env と一致した page_id を fallback で
      # 最初の active tenant に紐付ける。OAuth 接続完了後 (tenant_meta_config に
      # データ投入後) は不要だが、過渡期に必要 (spec §5-7 / Sprint 6 設計)。
      - META_PAGE_ID=${META_PAGE_ID:-}
      - META_PAGE_ACCESS_TOKEN=${META_PAGE_ACCESS_TOKEN:-}
      - ENFORCE_METADATA_FERNET_KEY=${ENFORCE_METADATA_FERNET_KEY:-}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-}
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M
    networks:
      - frontnet
      - backnet

  # フロントエンド（React + TypeScript + Vite）
  frontend:
    build:
      context: ./frontend
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_GCP_PROJECT_ID: ${VITE_GCP_PROJECT_ID}
    restart: unless-stopped
    healthcheck:
      # localhost が IPv6 (::1) に解決され nginx の IPv4-only listen と
      # ミスマッチするケースで unhealthy になる問題を回避するため
      # 127.0.0.1 を明示し、wget で実応答も併せて確認する。
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16M
    networks:
      - frontnet

  # Celeryワーカー（非同期タスク実行）
  celery-worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M
    networks:
      - backnet

  # Celery Beat（定期タスクスケジューラー）
  celery-beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16M
    networks:
      - backnet

  # ============================================================
  # Discord Gateway Worker (ADR-009 M2: Skeleton)
  # ============================================================
  # WebSocket 常駐プロセス。per-tenant Bot Token を環境変数経由で受け取り
  # READY/heartbeat ログのみ出力する skeleton 段階。
  # M3 で MESSAGE_CREATE → raw_webhook_events ingestion を追加予定。
  discord-gateway:
    build: ./backend
    command: python -m app.discord_gateway.main
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DISCORD_GATEWAY_LOG_LEVEL=${DISCORD_GATEWAY_LOG_LEVEL:-INFO}
      # per-tenant Bot Token（ADR-009 5-3）
      # 形式: DISCORD_BOT_TOKEN_<TENANT_ID>=<token>
      # tenant_004 = HIGH LIFE JPN
      - DISCORD_BOT_TOKEN_4=${DISCORD_BOT_TOKEN_4:-}
      - DISCORD_TENANT_CODE_4=${DISCORD_TENANT_CODE_4:-highlife-jpn}
    # M2 では Redis に触らないため depends_on は不要。M4 で Redis Pub/Sub
    # 利用開始時に condition: service_healthy で復活させる。
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16M
    networks:
      - backnet

  # Redisキャッシュ
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16M
    networks:
      - backnet

  # PostgreSQLデータベース
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    networks:
      - backnet

volumes:
  postgres_data:
  redis_data:

networks:
  frontnet:
  backnet:
