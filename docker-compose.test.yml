# テスト用 PostgreSQL のみ起動する構成
# 使い方: docker compose -f docker-compose.test.yml up -d
version: '3.8'

services:
  postgres-test:
    image: postgres:16
    environment:
      - POSTGRES_USER=myapp_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=myapp_db
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
