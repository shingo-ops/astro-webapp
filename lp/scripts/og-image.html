<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SalesAnchor OG Image</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Noto Sans JP', system-ui, sans-serif;
  }

  .canvas {
    width: 1200px;
    height: 630px;
    background:
      radial-gradient(ellipse at top right, rgba(24, 119, 242, 0.10) 0%, transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(14, 73, 143, 0.08) 0%, transparent 55%),
      linear-gradient(135deg, #ffffff 0%, #f6faff 50%, #e7f3ff 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
  }

  /* 微細なドット背景でテック感 */
  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(24, 119, 242, 0.06) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .logo-icon {
    width: 110px;
    height: 110px;
    background: linear-gradient(135deg, #1877f2 0%, #0e498f 100%);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 32px -8px rgba(24, 119, 242, 0.35);
  }

  .logo-icon svg {
    width: 64px;
    height: 64px;
  }

  .brand-name {
    font-size: 88px;
    font-weight: 900;
    color: #0e498f;
    letter-spacing: -2px;
    line-height: 1;
  }

  .tagline {
    font-size: 38px;
    font-weight: 700;
    color: #1463cc;
    letter-spacing: 2px;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .description {
    font-size: 26px;
    font-weight: 400;
    color: #4b5563;
    text-align: center;
    line-height: 1.5;
    max-width: 880px;
    position: relative;
    z-index: 1;
  }

  .footer {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 1;
  }

  .domain {
    font-size: 22px;
    font-weight: 500;
    color: #1877f2;
    letter-spacing: 1px;
  }

  .divider {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #a8d2ff;
  }

  .org {
    font-size: 18px;
    font-weight: 400;
    color: #6b7280;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="logo-block">
    <div class="logo-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 14 L32 50 M20 26 L32 14 L44 26 M22 42 Q32 52 42 42"
              stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="brand-name">SalesAnchor</div>
  </div>

  <div class="tagline">統合 CRM for TCG Export</div>

  <div class="description">
    Messenger / Instagram / LINE / Discord を 1 画面で。<br>
    在庫構造化・請求自動化・AI 分析を備えた B2B SaaS。
  </div>

  <div class="footer">
    <div class="domain">salesanchor.jp</div>
    <div class="divider"></div>
    <div class="org">HIGH LIFE JPN</div>
  </div>
</div>
</body>
</html>
