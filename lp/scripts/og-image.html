    left: 50%;

    font-weight: 700;
    color: #1877f2;

  .divider {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #a8d2ff;
  }

  .org {
    font-size: 18px;
    font-weight: 400;
    color: #6b7280;
