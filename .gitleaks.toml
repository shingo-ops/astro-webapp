title = "salesanchor gitleaks config"

[extend]
# gitleaks デフォルトルールセットを継承
useDefault = true

# =============================================================
# allowlist: 誤検知として許可するパターン（グローバル）
# =============================================================

[allowlist]
description = "プロジェクト固有の誤検知除外ルール"
paths = [
  ".env.example",
]
regexes = [
  # ドキュメント内の公開済み Meta App ID（秘密情報でない）
  "1250869697105619",
  # Google OAuth クライアントID（公開情報）
  "730863365967-icreuf1q3l7uenlf8iifh3hi0cumqa7e\\.apps\\.googleusercontent\\.com",
  # テスト・サンプル用トークンのプレースホルダ
  "your-secret-verify-token-here",
  "your-.*-here",
  "example\\.com",
  "test@example\\.com",
  # Fernet鍵生成コマンドのサンプル（実値ではない）
  "Fernet\\.generate_key\\(\\)",
  # スクリプト内のサンプルARN・リソースID
  "AWS_ACCOUNT_ID",
]

# =============================================================
# 追加ルール: このプロジェクト固有のパターン
# =============================================================

[[rules]]
id = "salesanchor-fernet-key"
description = "METADATA_FERNET_KEY の平文埋め込み検出"
regex = '''METADATA_FERNET_KEY\s*=\s*[A-Za-z0-9+/=_-]{44,}'''
tags = ["secret", "fernet"]
[rules.allowlist]
paths = [".env.example", "docs/"]

[[rules]]
id = "salesanchor-meta-app-secret"
description = "META_APP_SECRET の平文埋め込み検出"
regex = '''META_APP_SECRET\s*=\s*[a-f0-9]{32,}'''
tags = ["secret", "meta"]
[rules.allowlist]
paths = [".env.example"]
