version: "3.8"

services:
  node-exporter:
    image: prom/node-exporter:v1.11.1
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "${APP_VPS_IP:-49.212.137.46}:9100:9100"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres
    ports:
      - "${APP_VPS_IP:-49.212.137.46}:9187:9187"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    command:
      - "-nginx.scrape-uri=http://nginx:80/nginx_status"
    depends_on:
      - nginx
    ports:
      - "${APP_VPS_IP:-49.212.137.46}:9113:9113"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    depends_on:
      - redis
    ports:
      - "${APP_VPS_IP:-49.212.137.46}:9121:9121"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"
    security_opt:
      - no-new-privileges:true

  promtail:
    image: grafana/promtail:3.6.11
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - "-config.file=/etc/promtail/config.yml"
      - "-config.expand-env=true"
    environment:
      # SSH逆トンネル経由でLokiへ送信（mgmt VPS port 3100 → app VPS 0.0.0.0:13100 にフォワード）
      - PROMTAIL_LOKI_URL=http://host-gateway:13100/loki/api/v1/push
    extra_hosts:
      - "host-gateway:host-gateway"
    restart: unless-stopped
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
